<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LiveScore</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiveScore">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --bg4: #1e1e28;
  --line: #2a2a38;
  --line2: #363648;
  --text: #f0f0f8;
  --muted: #7878a0;
  --muted2: #4a4a68;
  --green: #00e676;
  --green-dim: #00c45a;
  --red: #ff4d6d;
  --amber: #ffb300;
  --blue: #448aff;
  --purple: #b388ff;
  --live: #ff2d55;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }

/* ── Status bar space ── */
.status-bar { height: var(--safe-top); background: var(--bg); }

/* ── Top bar ── */
.topbar {
  padding: 12px 16px 0;
  background: var(--bg);
  position: relative;
  z-index: 20;
}
.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.app-logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}
.app-logo span { color: var(--green); }
.topbar-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg3);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
}

/* ── Sport tabs ── */
.sport-tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 1px;
  border-bottom: 1px solid var(--line);
}
.sport-tabs::-webkit-scrollbar { display: none; }
.sport-tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sport-tab.active { color: var(--text); border-bottom-color: var(--green); }
.sport-tab .live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--live);
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ── Date strip ── */
.date-strip {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 10px 16px;
  gap: 8px;
  background: var(--bg);
}
.date-strip::-webkit-scrollbar { display: none; }
.date-chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg3);
  color: var(--muted);
  border: 1px solid var(--line);
  transition: all .15s;
}
.date-chip.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
.date-chip.today { font-weight: 700; }

/* ── Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  padding-bottom: calc(60px + var(--safe-bottom));
}
.content::-webkit-scrollbar { display: none; }

/* ── League group ── */
.league-group { margin-bottom: 2px; }
.league-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 5;
  cursor: pointer;
}
.league-flag { font-size: 16px; }
.league-name { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; flex: 1; }
.league-chevron { font-size: 10px; color: var(--muted2); transition: transform .2s; }
.league-header.collapsed .league-chevron { transform: rotate(-90deg); }

/* ── Match row ── */
.match-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .1s;
  gap: 10px;
}
.match-row:active { background: var(--bg3); }

.match-time-col { width: 44px; flex-shrink: 0; text-align: center; }
.match-time { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.match-time.live { color: var(--live); font-weight: 600; }
.match-min { font-family: var(--mono); font-size: 10px; color: var(--live); }
.match-status-fin { font-size: 10px; color: var(--muted2); font-weight: 500; }

.match-teams-col { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.match-team { display: flex; align-items: center; gap: 8px; }
.team-logo { width: 18px; height: 18px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; overflow: hidden; }
.team-logo img { width: 100%; height: 100%; object-fit: cover; }
.team-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.team-name.winner { font-weight: 700; color: var(--text); }

.match-scores-col { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
.score { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--text); min-width: 20px; text-align: center; }
.score.winner { color: var(--green); }
.score.live-score { color: var(--live); }

.match-fav { color: var(--muted2); font-size: 14px; padding: 4px; cursor: pointer; flex-shrink: 0; }
.match-fav.active { color: var(--amber); }

/* ── Match detail overlay ── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}
.overlay.open { transform: translateY(0); }

.overlay-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
}
.back-btn { font-size: 20px; cursor: pointer; color: var(--muted); padding: 4px; }
.overlay-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

/* ── Scoreboard hero ── */
.scoreboard {
  padding: 24px 20px;
  background: var(--bg2);
  text-align: center;
  border-bottom: 1px solid var(--line);
}
.sb-status { font-family: var(--mono); font-size: 11px; color: var(--live); margin-bottom: 16px; text-transform: uppercase; letter-spacing: .1em; }
.sb-status.fin { color: var(--muted); }
.sb-teams { display: flex; align-items: center; justify-content: center; gap: 0; }
.sb-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.sb-logo { width: 52px; height: 52px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 22px; }
.sb-team-name { font-size: 13px; font-weight: 600; text-align: center; }
.sb-score-block { display: flex; align-items: center; gap: 8px; padding: 0 16px; }
.sb-score { font-family: var(--mono); font-size: 42px; font-weight: 700; line-height: 1; }
.sb-score.live { color: var(--live); }
.sb-divider { font-size: 24px; color: var(--muted2); }

/* ── Events timeline ── */
.events-list { padding: 16px; display: flex; flex-direction: column; gap: 2px; }
.event-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; }
.event-item:nth-child(odd) { background: var(--bg3); }
.event-min { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 32px; flex-shrink: 0; text-align: right; }
.event-icon { font-size: 14px; width: 24px; text-align: center; }
.event-text { font-size: 13px; flex: 1; }
.event-text strong { font-weight: 600; }
.event-text small { display: block; font-size: 11px; color: var(--muted); }

/* ── Stats ── */
.stats-section { padding: 16px; }
.stats-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; }
.stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.stat-val { font-family: var(--mono); font-size: 13px; font-weight: 600; width: 32px; text-align: center; flex-shrink: 0; }
.stat-bar-wrap { flex: 1; display: flex; gap: 3px; align-items: center; }
.stat-bar { height: 4px; border-radius: 2px; transition: width .4s; }
.stat-bar.home { background: var(--blue); border-radius: 2px 0 0 2px; margin-left: auto; }
.stat-bar.away { background: var(--purple); border-radius: 0 2px 2px 0; }
.stat-label { font-size: 11px; color: var(--muted); text-align: center; width: 90px; flex-shrink: 0; }

/* ── MMA specific ── */
.mma-card { background: var(--bg3); border-radius: 10px; margin: 12px 16px; padding: 16px; border: 1px solid var(--line); }
.mma-event-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--live); margin-bottom: 12px; }
.mma-fight { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); gap: 8px; }
.mma-fight:last-child { border-bottom: none; }
.mma-fighter { flex: 1; text-align: center; }
.mma-fighter-name { font-size: 13px; font-weight: 600; }
.mma-fighter-record { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.mma-vs { font-family: var(--mono); font-size: 11px; color: var(--muted2); flex-shrink: 0; }
.mma-weight { font-size: 10px; color: var(--muted); text-align: center; margin-top: 4px; font-family: var(--mono); }
.mma-title-fight { display: inline-block; font-size: 9px; background: var(--amber); color: #000; border-radius: 3px; padding: 1px 6px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }

/* ── Tennis specific ── */
.tennis-sets { display: flex; gap: 4px; }
.set-score { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 2px 5px; background: var(--bg3); border-radius: 3px; }
.set-score.current { color: var(--green); }

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border-top: 1px solid var(--line);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 50;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 0 8px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 500;
  transition: color .15s;
}
.nav-item.active { color: var(--green); }
.nav-icon { font-size: 20px; line-height: 1; }

/* ── Loading ── */
.skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.sk-row { height: 60px; margin-bottom: 1px; }
.sk-header { height: 36px; margin-bottom: 1px; }

/* ── Empty ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── Search ── */
.search-bar {
  padding: 8px 16px 12px;
  background: var(--bg);
}
.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
}
.search-input::placeholder { color: var(--muted2); }
.search-input:focus { border-color: var(--green); }

/* ── Filter chips ── */
.filter-chips {
  display: flex;
  gap: 6px;
  padding: 0 16px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg3);
  color: var(--muted);
  border: 1px solid var(--line);
  transition: all .15s;
}
.filter-chip.active { background: var(--bg4); color: var(--text); border-color: var(--line2); }
</style>
</head>
<body>
<div id="app">
  <div class="status-bar"></div>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-row">
      <div class="app-logo">Live<span>Score</span></div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
        <button class="icon-btn">🔔</button>
      </div>
    </div>

    <!-- Sport Tabs -->
    <div class="sport-tabs" id="sport-tabs">
      <button class="sport-tab active" onclick="setSport('soccer')" data-sport="soccer">
        ⚽ Fútbol <div class="live-dot"></div>
      </button>
      <button class="sport-tab" onclick="setSport('basketball')" data-sport="basketball">
        🏀 Básquet
      </button>
      <button class="sport-tab" onclick="setSport('tennis')" data-sport="tennis">
        🎾 Tenis
      </button>
      <button class="sport-tab" onclick="setSport('mma')" data-sport="mma">
        🥊 UFC/MMA
      </button>
    </div>
  </div>

  <!-- Search bar (hidden by default) -->
  <div class="search-bar" id="search-bar" style="display:none">
    <input class="search-input" placeholder="Buscar equipo, liga o partido..." id="search-input" oninput="filterMatches()">
  </div>

  <!-- Date strip -->
  <div class="date-strip" id="date-strip"></div>

  <!-- Filter chips (for soccer) -->
  <div class="filter-chips" id="filter-chips" style="display:none">
    <button class="filter-chip active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-chip" onclick="setFilter('live', this)">🔴 En vivo</button>
    <button class="filter-chip" onclick="setFilter('upcoming', this)">Próximos</button>
    <button class="filter-chip" onclick="setFilter('finished', this)">Terminados</button>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div style="padding:20px">
      <div class="skeleton sk-header"></div>
      <div class="skeleton sk-row" style="margin-top:1px"></div>
      <div class="skeleton sk-row"></div>
      <div class="skeleton sk-row"></div>
      <div class="skeleton sk-header" style="margin-top:8px"></div>
      <div class="skeleton sk-row" style="margin-top:1px"></div>
      <div class="skeleton sk-row"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="setNav('scores', this)">
      <span class="nav-icon">📊</span>Scores
    </button>
    <button class="nav-item" onclick="setNav('favorites', this)">
      <span class="nav-icon">⭐</span>Favoritos
    </button>
    <button class="nav-item" onclick="setNav('standings', this)">
      <span class="nav-icon">🏆</span>Tablas
    </button>
    <button class="nav-item" onclick="setNav('news', this)">
      <span class="nav-icon">📰</span>Noticias
    </button>
  </nav>
</div>

<!-- Match Detail Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-header">
    <div class="back-btn" onclick="closeOverlay()">←</div>
    <div class="overlay-title" id="overlay-league">Liga</div>
    <div class="icon-btn match-fav" id="overlay-fav" onclick="toggleOverlayFav()">☆</div>
  </div>
  <div class="content" id="overlay-content"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let currentSport = 'soccer';
let currentDateIdx = 2; // hoy
let currentFilter = 'all';
let currentNav = 'scores';
let favorites = JSON.parse(localStorage.getItem('lsfavs') || '[]');
let currentMatchId = null;
let searchVisible = false;
let allMatches = {};
let allDateKeys = [];

// Generar fechas (-2 a +3)
function buildDates() {
  const dates = [];
  const today = new Date();
  for (let i = -2; i <= 3; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const key = `${y}${m}${day}`;
    const label = i === -2 ? 'Ant.' : i === -1 ? 'Ayer' : i === 0 ? 'Hoy' : i === 1 ? 'Mañ.' : `${d.getDate()}/${d.getMonth()+1}`;
    dates.push({ key, label, isToday: i === 0 });
  }
  return dates;
}

const DATES = buildDates();

function initDateStrip() {
  const strip = document.getElementById('date-strip');
  strip.innerHTML = DATES.map((d, i) => `
    <div class="date-chip ${i === currentDateIdx ? 'active' : ''} ${d.isToday ? 'today' : ''}"
         onclick="selectDate(${i})">${d.label}</div>
  `).join('');
}

function selectDate(idx) {
  currentDateIdx = idx;
  initDateStrip();
  loadSport(currentSport);
}

// ── Sport switching ────────────────────────────────────────────────────────────
function setSport(sport) {
  currentSport = sport;
  document.querySelectorAll('.sport-tab').forEach(t => t.classList.toggle('active', t.dataset.sport === sport));
  document.getElementById('filter-chips').style.display = sport === 'soccer' ? 'flex' : 'none';
  loadSport(sport);
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderSoccer();
}

function setNav(nav, el) {
  currentNav = nav;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (nav === 'favorites') renderFavorites();
  else if (nav === 'scores') loadSport(currentSport);
  else if (nav === 'standings') renderStandings();
  else if (nav === 'news') renderNews();
}

// ── Loading state ──────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('content').innerHTML = `
    <div style="padding:20px">
      <div class="skeleton sk-header"></div>
      <div class="skeleton sk-row" style="margin-top:1px"></div>
      <div class="skeleton sk-row"></div>
      <div class="skeleton sk-row"></div>
      <div class="skeleton sk-header" style="margin-top:8px"></div>
      <div class="skeleton sk-row" style="margin-top:1px"></div>
      <div class="skeleton sk-row"></div>
    </div>`;
}

// ── Soccer ─────────────────────────────────────────────────────────────────────
async function loadSoccer() {
  showLoading();
  const dateKey = DATES[currentDateIdx].key;
  try {
    // Múltiples ligas en paralelo
    const leagues = [
      { id: 'fifa.world', name: 'Mundial 2026', flag: '🌍' },
      { id: 'fifa.worldq.conmebol', name: 'Eliminatorias CONMEBOL', flag: '🌎' },
      { id: 'conmebol.copa', name: 'Copa América', flag: '🏆' },
      { id: 'conmebol.libertadores', name: 'Copa Libertadores', flag: '🌎' },
      { id: 'conmebol.sudamericana', name: 'Copa Sudamericana', flag: '🌎' },
      { id: 'uefa.champions', name: 'Champions League', flag: '⭐' },
      { id: 'uefa.europa', name: 'Europa League', flag: '🔵' },
      { id: 'esp.1', name: 'La Liga', flag: '🇪🇸' },
      { id: 'eng.1', name: 'Premier League', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
      { id: 'ger.1', name: 'Bundesliga', flag: '🇩🇪' },
      { id: 'ita.1', name: 'Serie A', flag: '🇮🇹' },
      { id: 'fra.1', name: 'Ligue 1', flag: '🇫🇷' },
      { id: 'por.1', name: 'Liga Portugal', flag: '🇵🇹' },
      { id: 'usa.1', name: 'MLS', flag: '🇺🇸' },
      { id: 'arg.1', name: 'Liga Argentina', flag: '🇦🇷' },
      { id: 'chi.1', name: 'Primera Chile', flag: '🇨🇱' },
      { id: 'bra.1', name: 'Brasileirao', flag: '🇧🇷' },
      { id: 'mex.1', name: 'Liga MX', flag: '🇲🇽' },
      { id: 'col.1', name: 'Liga Colombia', flag: '🇨🇴' },
      { id: 'uru.1', name: 'Primera Uruguay', flag: '🇺🇾' },
    ];

    const results = await Promise.allSettled(
      leagues.map(l => fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${l.id}/scoreboard?dates=${dateKey}`)
        .then(r => r.ok ? r.json() : null)
        .then(d => ({ ...l, events: d?.events || [] }))
      )
    );

    allMatches.soccer = results
      .filter(r => r.status === 'fulfilled' && r.value?.events?.length > 0)
      .map(r => r.value);

    renderSoccer();
  } catch (e) {
    showError('No se pudieron cargar los partidos.');
  }
}

function renderSoccer() {
  const content = document.getElementById('content');
  const leagues = allMatches.soccer || [];

  if (leagues.every(l => l.events.length === 0)) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-text">No hay partidos para esta fecha</div></div>`;
    return;
  }

  let html = '';
  for (const league of leagues) {
    const events = filterEvents(league.events);
    if (events.length === 0) continue;

    html += `<div class="league-group">
      <div class="league-header" onclick="toggleLeague(this)">
        <span class="league-flag">${league.flag}</span>
        <span class="league-name">${league.name}</span>
        <span class="league-chevron">▼</span>
      </div>
      <div class="league-matches">`;

    for (const event of events) {
      const comp = event.competitions?.[0];
      const home = comp?.competitors?.find(c => c.homeAway === 'home');
      const away = comp?.competitors?.find(c => c.homeAway === 'away');
      if (!home || !away) continue;

      const status = event.status?.type;
      const isLive = status?.state === 'in';
      const isFin = status?.state === 'post';
      const min = event.status?.displayClock || '';
      const homeScore = home.score || '0';
      const awayScore = away.score || '0';
      const homeWin = isFin && parseInt(homeScore) > parseInt(awayScore);
      const awayWin = isFin && parseInt(awayScore) > parseInt(homeScore);
      const isFav = favorites.includes(event.id);

      const timeStr = event.date ? new Date(event.date).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }) : '';
      const homeLogo = home.team?.logos?.[0]?.href || '';
      const awayLogo = away.team?.logos?.[0]?.href || '';

      html += `<div class="match-row" onclick="openMatch('${event.id}', 'soccer')">
        <div class="match-time-col">
          ${isLive ? `<div class="match-time live">${min}'</div>` :
            isFin ? `<div class="match-status-fin">FIN</div>` :
            `<div class="match-time">${timeStr}</div>`}
        </div>
        <div class="match-teams-col">
          <div class="match-team">
            <div class="team-logo">${homeLogo ? `<img src="${homeLogo}" loading="lazy">` : '🏠'}</div>
            <div class="team-name ${homeWin ? 'winner' : ''}">${home.team?.displayName || 'Local'}</div>
          </div>
          <div class="match-team">
            <div class="team-logo">${awayLogo ? `<img src="${awayLogo}" loading="lazy">` : '✈️'}</div>
            <div class="team-name ${awayWin ? 'winner' : ''}">${away.team?.displayName || 'Visitante'}</div>
          </div>
        </div>
        <div class="match-scores-col">
          <div class="score ${homeWin ? 'winner' : ''} ${isLive ? 'live-score' : ''}">${isLive || isFin ? homeScore : ''}</div>
          <div class="score ${awayWin ? 'winner' : ''} ${isLive ? 'live-score' : ''}">${isLive || isFin ? awayScore : ''}</div>
        </div>
        <div class="match-fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav('${event.id}', this)">
          ${isFav ? '★' : '☆'}
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  content.innerHTML = html || `<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-text">No hay partidos para este filtro</div></div>`;
}

function filterEvents(events) {
  if (currentFilter === 'all') return events;
  if (currentFilter === 'live') return events.filter(e => e.status?.type?.state === 'in');
  if (currentFilter === 'upcoming') return events.filter(e => e.status?.type?.state === 'pre');
  if (currentFilter === 'finished') return events.filter(e => e.status?.type?.state === 'post');
  return events;
}

// ── Tennis ─────────────────────────────────────────────────────────────────────
async function loadTennis() {
  showLoading();
  const content = document.getElementById('content');

  // ESPN tennis endpoints
  const endpoints = [
    'https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard',
    'https://site.api.espn.com/apis/site/v2/sports/tennis/wta/scoreboard',
  ];

  let allTennisEvents = [];
  for (const url of endpoints) {
    try {
      const r = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
      if (!r.ok) continue;
      const data = await r.json();
      if (data.events?.length) allTennisEvents.push(...data.events.map(e => ({ ...e, _tour: url.includes('wta') ? 'WTA' : 'ATP' })));
    } catch(e) {}
  }

  if (allTennisEvents.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">🎾</div><div class="empty-text">No hay partidos de tenis disponibles</div></div>`;
    return;
  }

  // Agrupar por torneo
  const byTournament = {};
  for (const event of allTennisEvents) {
    const tname = event.name || event._tour;
    if (!byTournament[tname]) byTournament[tname] = { name: tname, tour: event._tour, events: [] };
    byTournament[tname].events.push(event);
  }

  let html = '';
  for (const [tname, tdata] of Object.entries(byTournament)) {
    html += `<div class="league-group">
      <div class="league-header" onclick="toggleLeague(this)">
        <span class="league-flag">🎾</span>
        <span class="league-name">${tname} · ${tdata.tour}</span>
        <span class="league-chevron">▼</span>
      </div><div class="league-matches">`;

    for (const event of tdata.events) {
      const comp = event.competitions?.[0];
      const p1 = comp?.competitors?.[0];
      const p2 = comp?.competitors?.[1];
      if (!p1 || !p2) continue;
      const n1 = p1.athlete?.displayName || p1.team?.displayName || 'P1';
      const n2 = p2.athlete?.displayName || p2.team?.displayName || 'P2';
      const isLive = event.status?.type?.state === 'in';
      const isFin = event.status?.type?.state === 'post';
      const s1 = p1.score || '';
      const s2 = p2.score || '';
      const timeStr = event.date ? new Date(event.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '';
      const round = comp?.notes?.[0]?.headline || '';

      html += `<div class="match-row" onclick="openMatch('${event.id}','tennis')">
        <div class="match-time-col">
          ${isLive ? `<div class="match-time live">LIVE</div>` :
            isFin ? `<div class="match-status-fin">FIN</div>` :
            `<div class="match-time">${timeStr}</div>`}
        </div>
        <div class="match-teams-col">
          <div class="match-team"><div class="team-logo">🎾</div><div class="team-name">${n1}</div></div>
          <div class="match-team"><div class="team-logo">🎾</div><div class="team-name">${n2}</div></div>
        </div>
        <div class="match-scores-col">
          <div class="score ${isLive?'live-score':''}">${s1}</div>
          <div class="score ${isLive?'live-score':''}">${s2}</div>
        </div>
        <div class="match-fav" onclick="event.stopPropagation();toggleFav('${event.id}',this)">☆</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  content.innerHTML = html;
}

// ── MMA/UFC ────────────────────────────────────────────────────────────────────
async function loadMMA() {
  showLoading();
  const content = document.getElementById('content');
  try {
    const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/mma/ufc/scoreboard', {
      headers: { 'User-Agent': 'Mozilla/5.0' }
    });
    const data = r.ok ? await r.json() : { events: [] };
    const events = data.events || [];

    if (events.length === 0) {
      // Mostrar próximos eventos conocidos
      content.innerHTML = renderMMAStatic();
      return;
    }

    let html = '';
    for (const event of events) {
      const comp = event.competitions?.[0];
      const fights = event.competitions || [];
      html += `<div class="mma-card">
        <div class="mma-event-name">${event.name || 'UFC Event'}</div>`;

      for (const fight of fights) {
        const f1 = fight.competitors?.[0];
        const f2 = fight.competitors?.[1];
        if (!f1 || !f2) continue;
        const isTitle = fight.notes?.some(n => n.headline?.toLowerCase().includes('title'));
        html += `<div class="mma-fight">
          <div class="mma-fighter">
            <div class="mma-fighter-name">${f1.athlete?.displayName || f1.team?.displayName || '?'}</div>
            <div class="mma-fighter-record">${f1.records?.[0]?.summary || ''}</div>
          </div>
          <div>
            <div class="mma-vs">VS</div>
            ${isTitle ? '<div class="mma-title-fight">🏆 TÍTULO</div>' : ''}
          </div>
          <div class="mma-fighter">
            <div class="mma-fighter-name">${f2.athlete?.displayName || f2.team?.displayName || '?'}</div>
            <div class="mma-fighter-record">${f2.records?.[0]?.summary || ''}</div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }
    content.innerHTML = html || renderMMAStatic();
  } catch(e) {
    content.innerHTML = renderMMAStatic();
  }
}

// ── Match Detail ───────────────────────────────────────────────────────────────
async function openMatch(id, sport) {
  currentMatchId = id;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay-content').innerHTML = `<div style="padding:20px"><div class="skeleton" style="height:160px;border-radius:12px"></div><div class="skeleton sk-header" style="margin-top:16px"></div><div class="skeleton sk-row"></div><div class="skeleton sk-row"></div></div>`;

  // Buscar el evento en los datos cargados
  let event = null;
  if (sport === 'soccer') {
    for (const league of (allMatches.soccer || [])) {
      event = league.events?.find(e => e.id === id);
      if (event) { event._leagueName = league.name; break; }
    }
  } else if (sport === 'basketball') {
    for (const league of (allMatches.basketball || [])) {
      event = league.events?.find(e => e.id === id);
      if (event) { event._leagueName = league.name; break; }
    }
  }

  if (event) renderMatchDetail(event, sport);
  else document.getElementById('overlay-content').innerHTML = `<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-text">No se pudo cargar el partido</div></div>`;
}

function renderMatchDetail(event, sport) {
  const comp = event.competitions?.[0];
  const home = comp?.competitors?.find(c => c.homeAway === 'home') || comp?.competitors?.[0];
  const away = comp?.competitors?.find(c => c.homeAway === 'away') || comp?.competitors?.[1];
  if (!home || !away) return;

  const isLive = event.status?.type?.state === 'in';
  const isFin = event.status?.type?.state === 'post';
  const homeScore = home.score || '0';
  const awayScore = away.score || '0';
  const homeLogo = home.team?.logos?.[0]?.href || '';
  const awayLogo = away.team?.logos?.[0]?.href || '';

  document.getElementById('overlay-league').textContent = event._leagueName || event.name || '';

  const details = comp?.details || [];
  const stats = comp?.statistics || home.statistics || [];

  let html = `
    <div class="scoreboard">
      <div class="sb-status ${isFin?'fin':''}">
        ${isLive ? `🔴 EN VIVO · ${event.status?.displayClock || ''}` :
          isFin ? 'PARTIDO TERMINADO' :
          new Date(event.date).toLocaleString('es', {weekday:'long', hour:'2-digit', minute:'2-digit'})}
      </div>
      <div class="sb-teams">
        <div class="sb-team">
          <div class="sb-logo">${homeLogo ? `<img src="${homeLogo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover">` : '🏠'}</div>
          <div class="sb-team-name">${home.team?.displayName || 'Local'}</div>
        </div>
        <div class="sb-score-block">
          <div class="sb-score ${isLive?'live':''}">${isLive||isFin?homeScore:'-'}</div>
          <div class="sb-divider">:</div>
          <div class="sb-score ${isLive?'live':''}">${isLive||isFin?awayScore:'-'}</div>
        </div>
        <div class="sb-team">
          <div class="sb-logo">${awayLogo ? `<img src="${awayLogo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover">` : '✈️'}</div>
          <div class="sb-team-name">${away.team?.displayName || 'Visitante'}</div>
        </div>
      </div>
    </div>`;

  // Eventos del partido
  if (details.length > 0) {
    html += `<div class="events-list">`;
    for (const d of details) {
      const icon = d.type?.text === 'Goal' ? '⚽' : d.type?.text === 'Yellow Card' ? '🟨' : d.type?.text === 'Red Card' ? '🟥' : d.type?.text?.includes('Sub') ? '🔄' : '•';
      html += `<div class="event-item">
        <div class="event-min">${d.clock?.displayValue || ''}'</div>
        <div class="event-icon">${icon}</div>
        <div class="event-text"><strong>${d.athletesInvolved?.[0]?.displayName || ''}</strong><small>${d.team?.displayName || ''}</small></div>
      </div>`;
    }
    html += `</div>`;
  } else if (isLive || isFin) {
    html += `<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No hay eventos disponibles</div>`;
  }

  // Estadísticas
  if (stats.length > 0 || (home.statistics?.length)) {
    const homeStats = home.statistics || [];
    const awayStats = away.statistics || [];
    if (homeStats.length > 0) {
      html += `<div class="stats-section"><div class="stats-title">Estadísticas</div>`;
      for (let i = 0; i < Math.min(homeStats.length, 8); i++) {
        const hs = homeStats[i];
        const as = awayStats[i];
        if (!hs) continue;
        const hv = parseFloat(hs.displayValue) || 0;
        const av = parseFloat(as?.displayValue) || 0;
        const total = hv + av || 1;
        const hpct = Math.round((hv/total)*100);
        const apct = 100 - hpct;
        html += `<div class="stat-row">
          <div class="stat-val" style="color:var(--blue)">${hs.displayValue}</div>
          <div class="stat-bar-wrap">
            <div class="stat-bar home" style="width:${hpct}%"></div>
            <div class="stat-bar away" style="width:${apct}%"></div>
          </div>
          <div class="stat-val" style="color:var(--purple)">${as?.displayValue || '0'}</div>
          <div class="stat-label">${hs.name || ''}</div>
        </div>`;
      }
      html += `</div>`;
    }
  }

  document.getElementById('overlay-content').innerHTML = html;
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  currentMatchId = null;
}

// ── Favorites ──────────────────────────────────────────────────────────────────
function toggleFav(id, el) {
  const idx = favorites.indexOf(id);
  if (idx === -1) { favorites.push(id); el.textContent = '★'; el.classList.add('active'); }
  else { favorites.splice(idx, 1); el.textContent = '☆'; el.classList.remove('active'); }
  localStorage.setItem('lsfavs', JSON.stringify(favorites));
}

function toggleOverlayFav() {
  if (!currentMatchId) return;
  const el = document.getElementById('overlay-fav');
  toggleFav(currentMatchId, el);
}

function renderFavorites() {
  const content = document.getElementById('content');
  if (favorites.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-text">Toca ☆ en cualquier partido para guardarlo aquí</div></div>`;
    return;
  }
  content.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-text">Ve a Scores y agrega favoritos</div></div>`;
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function toggleLeague(header) {
  header.classList.toggle('collapsed');
  const matches = header.nextElementSibling;
  if (matches) matches.style.display = header.classList.contains('collapsed') ? 'none' : 'block';
}

function toggleSearch() {
  searchVisible = !searchVisible;
  document.getElementById('search-bar').style.display = searchVisible ? 'block' : 'none';
  if (searchVisible) document.getElementById('search-input').focus();
}

function filterMatches() {
  const q = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('.match-row').forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(q) ? 'flex' : 'none';
  });
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${msg}</div></div>`;
}

function loadSport(sport) {
  if (sport === 'soccer') loadSoccer();
  else if (sport === 'basketball') loadBasketball();
  else if (sport === 'tennis') loadTennis();
  else if (sport === 'mma') loadMMA();
}

// Swipe para cerrar overlay
let touchStartY = 0;
document.getElementById('overlay').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
document.getElementById('overlay').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) closeOverlay();
});

// ── Init ───────────────────────────────────────────────────────────────────────
initDateStrip();
loadSoccer();

// Auto-refresh cada 60 segundos si hay partidos en vivo
setInterval(() => {
  if (currentNav === 'scores') loadSport(currentSport);
}, 60000);
