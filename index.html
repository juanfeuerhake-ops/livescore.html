<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LiveScore</title>
<meta name="theme-color" content="#06060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiveScore">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #06060f;
  --bg2:   #0b0b18;
  --bg3:   #111122;
  --bg4:   #181830;
  --bg5:   #1e1e38;
  --line:  rgba(255,255,255,.06);
  --line2: rgba(255,255,255,.12);
  --line3: rgba(255,255,255,.18);
  --text:  #f2f2ff;
  --t2:    #9090b8;
  --t3:    #50507a;
  --green: #00ff88;
  --g2:    #00cc6a;
  --g3:    rgba(0,255,136,.08);
  --red:   #ff3355;
  --amber: #ffcc00;
  --blue:  #4488ff;
  --purple:#a066ff;
  --live:  #ff2244;
  --pitch: #1a4a1a;
  --font:  'Plus Jakarta Sans', system-ui, sans-serif;
  --mono:  'JetBrains Mono', monospace;
  --st:    env(safe-area-inset-top,0px);
  --sb:    env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
button{border:none;background:none;font-family:var(--font);cursor:pointer}

/* ── App ── */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}

/* ── Topbar ── */
.topbar{
  padding:calc(var(--st) + 16px) 20px 0;
  background:linear-gradient(180deg, var(--bg) 0%, var(--bg)aa 100%);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  flex-shrink:0;
  position:relative;
  z-index:20;
}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--line2),transparent)}
.toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{font-size:24px;font-weight:800;letter-spacing:-1.5px}
.logo-live{background:linear-gradient(135deg,#fff,#c0c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-score{background:linear-gradient(135deg,var(--green),#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tbns{display:flex;gap:8px}
.tbn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg3);
  border:1px solid var(--line2);
  color:var(--t2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s
}
.tbn:active{transform:scale(.9);background:var(--bg4)}

/* ── Sport pills ── */
.pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:18px}
.pills::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:30px;
  font-size:13px;font-weight:700;
  color:var(--t2);background:var(--bg3);
  border:1.5px solid var(--line2);
  transition:all .2s
}
.pill.active{background:var(--green);border-color:var(--green);color:#000}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
.pill.active .live-dot{background:#000a}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

/* ── Date strip ── */
.dates{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:14px 20px;flex-shrink:0}
.dates::-webkit-scrollbar{display:none}
.dchip{
  flex-shrink:0;padding:7px 14px;border-radius:22px;
  font-size:12px;font-weight:700;
  color:var(--t3);background:transparent;
  border:1.5px solid transparent;transition:all .15s
}
.dchip.active{background:var(--bg4);border-color:var(--line2);color:var(--text)}
.dchip.today{color:var(--green)}
.dchip.active.today{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.3)}

/* ── Filter row ── */
.filters{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.fc{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:700;
  color:var(--t3);border:1.5px solid transparent;transition:all .15s
}
.fc.active{background:var(--bg4);border-color:var(--line2);color:var(--t2)}
.fc.live-fc.active{background:rgba(255,34,68,.1);border-color:rgba(255,34,68,.4);color:var(--red)}

/* ── Search ── */
.srchwrap{padding:0 20px 14px;flex-shrink:0}
.srch{
  width:100%;background:var(--bg3);
  border:1.5px solid var(--line2);border-radius:14px;
  padding:12px 16px;color:var(--text);
  font-family:var(--font);font-size:14px;outline:none;
  transition:border-color .2s
}
.srch::placeholder{color:var(--t3)}
.srch:focus{border-color:rgba(0,255,136,.4)}

/* ── Content ── */
.content{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:calc(72px + var(--sb))}
.content::-webkit-scrollbar{display:none}

/* ── League header ── */
.lghdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;
  background:var(--bg2);
  position:sticky;top:0;z-index:5;
  cursor:pointer;
  border-bottom:1px solid var(--line)
}
.lgflag{font-size:14px}
.lgname{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);flex:1}
.lgcount{font-family:var(--mono);font-size:10px;color:var(--t3);background:var(--bg4);padding:2px 8px;border-radius:10px}
.lgchev{font-size:8px;color:var(--t3);transition:transform .2s}
.lghdr.collapsed .lgchev{transform:rotate(-90deg)}

/* ── Match card ── */
.mcard{
  display:flex;align-items:center;
  padding:13px 20px;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  cursor:pointer;gap:12px;
  transition:background .12s;
  position:relative;overflow:hidden
}
.mcard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--green),var(--blue));
  transform:scaleY(0);transition:transform .2s;transform-origin:center
}
.mcard:active{background:var(--bg3)}
.mcard:active::before{transform:scaleY(1)}
.mcard.live-card{background:linear-gradient(90deg,rgba(255,34,68,.04) 0%,transparent 60%)}

/* Time */
.mtime{width:42px;flex-shrink:0;text-align:center}
.mtime-l{font-family:var(--mono);font-size:11px;color:var(--t3);line-height:1.3}
.mtime-l.live{color:var(--live);font-weight:700;font-size:10px}
.mtime-min{font-family:var(--mono);font-size:10px;color:var(--live);margin-top:2px}
.mtime-fin{font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}

/* Teams */
.mteams{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.mteam{display:flex;align-items:center;gap:8px}
.mflag{width:22px;height:22px;border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg4);font-size:14px}
.mflag img{width:100%;height:100%;object-fit:cover;border-radius:3px}
.mname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2)}
.mname.w{font-weight:700;color:var(--text)}

/* Score */
.mscores{display:flex;flex-direction:column;gap:8px;align-items:center}
.mscore{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--t3);min-width:20px;text-align:center;line-height:22px}
.mscore.w{color:var(--text)}
.mscore.live{color:var(--live)}

/* Fav */
.mfav{font-size:18px;color:var(--t3);padding:6px;flex-shrink:0;transition:all .2s}
.mfav.on{color:var(--amber);text-shadow:0 0 12px rgba(255,204,0,.4)}
.mfav:active{transform:scale(1.4)}

/* Live strip */
.lstrip{height:2px;background:linear-gradient(90deg,var(--live),transparent)}

/* ── Overlay ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.25,.8,.25,1);
  max-width:430px;margin:0 auto;
  display:flex;flex-direction:column
}
.overlay.open{transform:translateY(0)}
.ovhdr{
  display:flex;align-items:center;gap:12px;
  padding:calc(var(--st) + 14px) 20px 14px;
  background:var(--bg2);border-bottom:1px solid var(--line);
  flex-shrink:0
}
.ovback{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--t2);cursor:pointer;transition:all .15s
}
.ovback:active{transform:scale(.9)}
.ovlg{flex:1;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.ovfav{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t3);cursor:pointer;transition:all .15s}
.ovfav.on{color:var(--amber);border-color:rgba(255,204,0,.3);background:rgba(255,204,0,.08)}

/* ── Scoreboard hero ── */
.sbhero{
  background:linear-gradient(180deg,var(--bg3) 0%,var(--bg2) 100%);
  padding:28px 24px 24px;border-bottom:1px solid var(--line);
  position:relative;overflow:hidden;flex-shrink:0
}
.sbhero-glow{
  position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(0,255,136,.07) 0%,transparent 70%);
  pointer-events:none
}
.sbhero-glow.live{background:radial-gradient(circle,rgba(255,34,68,.08) 0%,transparent 70%)}
.sbstat{
  text-align:center;font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.15em;text-transform:uppercase;margin-bottom:22px
}
.sbstat.live{color:var(--live)}
.sbstat.fin{color:var(--t3)}
.sbstat.pre{color:var(--t2)}
.sbrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sbteam{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.sblogo{
  width:64px;height:64px;border-radius:50%;
  background:var(--bg4);border:2px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;overflow:hidden
}
.sblogo img{width:100%;height:100%;object-fit:cover}
.sbflg{width:36px;height:24px;border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sbflg img{width:100%;height:100%;object-fit:cover}
.sbtname{font-size:13px;font-weight:700;text-align:center;line-height:1.3;margin-top:2px}
.sbcenter{display:flex;flex-direction:column;align-items:center;gap:8px}
.sbscores{display:flex;align-items:center;gap:8px}
.sbn{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;color:var(--text)}
.sbn.live{color:var(--live);text-shadow:0 0 24px rgba(255,34,68,.35)}
.sbsep{font-family:var(--mono);font-size:30px;color:var(--t3)}
.sbmin{
  background:rgba(255,34,68,.12);border:1px solid rgba(255,34,68,.35);
  color:var(--live);font-family:var(--mono);font-size:12px;font-weight:700;
  padding:4px 12px;border-radius:20px
}

/* ── Overlay tabs ── */
.ovtabs{
  display:flex;background:var(--bg2);
  border-bottom:1px solid var(--line);flex-shrink:0
}
.ovtab{
  flex:1;padding:13px 8px;font-size:11px;font-weight:800;text-align:center;
  color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;
  text-transform:uppercase;letter-spacing:.06em;transition:all .15s
}
.ovtab.active{color:var(--green);border-bottom-color:var(--green)}

/* ── Events ── */
.evwrap{padding:16px 20px}
.evitem{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:12px;margin-bottom:4px;
  background:var(--bg3);border:1px solid var(--line)
}
.evmin{font-family:var(--mono);font-size:11px;color:var(--t3);width:28px;flex-shrink:0;text-align:right;font-weight:600}
.evicon{font-size:16px;width:26px;text-align:center}
.evinfo{flex:1}
.evplayer{font-size:13px;font-weight:700}
.evteam{font-size:11px;color:var(--t3);margin-top:1px}

/* ── Stats ── */
.stwrap{padding:20px}
.sthdrs{display:flex;justify-content:space-between;margin-bottom:18px}
.sthdr{font-size:12px;font-weight:800;letter-spacing:.04em}
.sthdr.h{color:var(--blue)}
.sthdr.a{color:var(--purple)}
.sthdr.mid{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.strow{margin-bottom:14px}
.stbars{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:5px;background:var(--bg4)}
.stbarh{background:linear-gradient(90deg,var(--blue),#6699ff);border-radius:3px 0 0 3px}
.stbara{background:linear-gradient(90deg,#cc88ff,var(--purple));border-radius:0 3px 3px 0}
.stvals{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;align-items:center}
.stval{font-family:var(--mono);font-size:13px;font-weight:700}
.stval.h{color:var(--blue);text-align:left}
.stval.a{color:var(--purple);text-align:right}
.stlabel{font-size:10px;color:var(--t3);text-align:center;text-transform:uppercase;letter-spacing:.04em}

/* ── PITCH / Formation ── */
.pitch-wrap{padding:16px 20px}
.pitch-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pitch-title span{flex:1;height:1px;background:var(--line)}
.pitch{
  position:relative;width:100%;aspect-ratio:0.65;
  background:linear-gradient(180deg,#0e2e0e 0%,#163016 100%);
  border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.08)
}
/* Grass stripes */
.pitch::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.025) 40px,rgba(255,255,255,.025) 80px)
}
/* Field lines */
.pitch-lines{position:absolute;inset:0;pointer-events:none}
.pitch-lines svg{width:100%;height:100%}
/* Players on pitch */
.pitch-players{position:absolute;inset:0}
.pitch-player{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;transition:transform .2s
}
.pitch-player:active{transform:translate(-50%,-50%) scale(1.1)}
.pp-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#000;
  position:relative;box-shadow:0 2px 8px rgba(0,0,0,.5);
  border:2px solid rgba(255,255,255,.3)
}
.pp-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:11px;font-weight:800
}
.pp-badge{
  position:absolute;top:-4px;right:-4px;
  width:14px;height:14px;border-radius:50%;
  background:var(--bg);border:1.5px solid var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;z-index:2
}
.pp-name{
  font-size:9px;font-weight:700;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
  white-space:nowrap;max-width:60px;
  overflow:hidden;text-overflow:ellipsis;text-align:center;
  background:rgba(0,0,0,.5);padding:1px 4px;border-radius:4px
}
/* Team colors */
.home-gk{background:#ffcc00}
.home-out{background:#4488ff}
.away-gk{background:#ff4444}
.away-out{background:#ff8800}

/* Bench */
.bench-section{margin-top:14px}
.bench-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.bench-title span{flex:1;height:1px;background:var(--line)}
.bench-player{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:var(--bg3);margin-bottom:3px;cursor:pointer;
  border:1px solid var(--line);transition:background .1s
}
.bench-player:active{background:var(--bg4)}
.bnum{font-family:var(--mono);font-size:11px;color:var(--t3);width:20px;text-align:center;flex-shrink:0}
.bpos{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;flex-shrink:0}
.bpos.GK{background:rgba(255,204,0,.2);color:var(--amber)}
.bpos.DEF{background:rgba(68,136,255,.2);color:var(--blue)}
.bpos.MID{background:rgba(160,102,255,.2);color:var(--purple)}
.bpos.FWD{background:rgba(0,255,136,.2);color:var(--green)}
.bname{flex:1;font-size:13px;font-weight:600}
.bbadges{display:flex;gap:4px}
.bbadge{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:700}
.bbadge.goal{background:rgba(0,255,136,.15);color:var(--green)}
.bbadge.assist{background:rgba(68,136,255,.15);color:var(--blue)}
.bbadge.y{background:rgba(255,204,0,.2);color:var(--amber)}
.bbadge.r{background:rgba(255,34,68,.2);color:var(--red)}
.bbadge.rat{background:var(--bg4);color:var(--t2)}
.barrow{color:var(--t3);font-size:14px}

/* ── Player panel ── */
#pp{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.25,.8,.25,1);
  max-width:430px;margin:0 auto;overflow-y:auto
}
#pp.open{transform:translateX(0)}
.pphdr{
  display:flex;align-items:center;gap:12px;
  padding:calc(var(--st) + 14px) 20px 16px;
  background:var(--bg2);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:5
}
.ppname{flex:1}
.ppname h3{font-size:18px;font-weight:800;letter-spacing:-.3px}
.ppname small{font-size:12px;color:var(--t3);font-weight:500}
.ppgrid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--line);margin:20px;
  border-radius:16px;overflow:hidden
}
.ppstat{background:var(--bg3);padding:20px 12px;text-align:center}
.ppval{font-family:var(--mono);font-size:28px;font-weight:700;margin-bottom:5px}
.ppval.g{color:var(--green)}
.ppval.b{color:var(--blue)}
.ppval.a{color:var(--amber)}
.ppval.p{color:var(--purple)}
.pplbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:700}

/* ── MMA ── */
.mmacard{
  margin:16px 20px;border-radius:20px;overflow:hidden;
  background:linear-gradient(135deg,var(--bg3),#150820);
  border:1px solid var(--line2)
}
.mmahdr{
  padding:16px 20px;
  background:linear-gradient(135deg,rgba(160,102,255,.12),rgba(255,34,68,.08));
  border-bottom:1px solid var(--line2)
}
.mmaevname{font-size:17px;font-weight:800;letter-spacing:-.3px}
.mmameta{font-size:12px;color:var(--t3);margin-top:4px}
.mmafight{
  display:flex;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--line);gap:12px
}
.mmafight:last-child{border-bottom:none}
.mmaf{flex:1}
.mmafname{font-size:14px;font-weight:700}
.mmafrec{font-family:var(--mono);font-size:11px;color:var(--t3);margin-top:2px}
.mmavsblock{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.mmavs{font-family:var(--mono);font-size:11px;color:var(--t3);font-weight:700}
.mmatag{
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
  padding:3px 8px;border-radius:6px;
  background:linear-gradient(135deg,var(--amber),#ff8800);color:#000
}
.mmaweight{font-size:10px;color:var(--t3);text-align:center}

/* ── Tennis match card ── */
.tennis-card{
  background:var(--bg);border-bottom:1px solid var(--line);
  padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer
}
.tennis-players{flex:1;display:flex;flex-direction:column;gap:6px}

<script>
// ── Helpers ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sleep = ms => new Promise(r=>setTimeout(r,ms));
window._pc = {};

// Country code → flag emoji
const FLAG_MAP = {
  'ESP':'🇪🇸','ENG':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','GER':'🇩🇪','ITA':'🇮🇹','FRA':'🇫🇷','POR':'🇵🇹',
  'BRA':'🇧🇷','ARG':'🇦🇷','URU':'🇺🇾','COL':'🇨🇴','CHI':'🇨🇱','MEX':'🇲🇽',
  'USA':'🇺🇸','NED':'🇳🇱','BEL':'🇧🇪','CRO':'🇭🇷','SRB':'🇷🇸','SUI':'🇨🇭',
  'DEN':'🇩🇰','SWE':'🇸🇪','NOR':'🇳🇴','AUT':'🇦🇹','POL':'🇵🇱','CZE':'🇨🇿',
  'HUN':'🇭🇺','RUS':'🇷🇺','UKR':'🇺🇦','TUR':'🇹🇷','GRE':'🇬🇷','ROU':'🇷🇴',
  'MAR':'🇲🇦','SEN':'🇸🇳','NGA':'🇳🇬','GHA':'🇬🇭','CMR':'🇨🇲','CIV':'🇨🇮',
  'EGY':'🇪🇬','TUN':'🇹🇳','ALG':'🇩🇿','RSA':'🇿🇦','KEN':'🇰🇪',
  'JPN':'🇯🇵','KOR':'🇰🇷','CHN':'🇨🇳','AUS':'🇦🇺','IRN':'🇮🇷','SAU':'🇸🇦',
  'QAT':'🇶🇦','UAE':'🇦🇪','IND':'🇮🇳','TPE':'🇹🇼',
  'CAN':'🇨🇦','ECU':'🇪🇨','PER':'🇵🇪','PAR':'🇵🇾','BOL':'🇧🇴','VEN':'🇻🇪',
  'CRC':'🇨🇷','PAN':'🇵🇦','HON':'🇭🇳','GTM':'🇬🇹','JAM':'🇯🇲','TRI':'🇹🇹',
  'WAL':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','SCO':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','NIR':'🇬🇧',
};

function teamFlag(team) {
  const abbr = team?.abbreviation?.toUpperCase()||'';
  const name = (team?.displayName||'').toLowerCase();
  const logo = team?.logos?.[0]?.href||'';
  const emoji = FLAG_MAP[abbr] || '';
  if (logo) return `<div class="mflag"><img src="${logo}" loading="lazy" onerror="this.parentNode.innerHTML='${emoji||'🏳'}'"></div>`;
  return `<div class="mflag">${emoji||'🏳'}</div>`;
}

function playerFlag(athlete) {
  const country = athlete?.flag?.href||athlete?.headshot?.href||'';
  const abbr = athlete?.nationality||athlete?.citizenship||'';
  const emoji = FLAG_MAP[abbr?.toUpperCase()||'']||'';
  if (country) return `<div class="tnis-flag"><img src="${country}" onerror="this.parentNode.textContent='${emoji}'"></div>`;
  return `<div class="tnis-flag" style="display:flex;align-items:center;justify-content:center;font-size:12px">${emoji||'🎾'}</div>`;
}

// ── State ──────────────────────────────────────────────────────────────────
let sport='soccer', dateIdx=2, filter='all', nav='scores';
let favs=JSON.parse(localStorage.getItem('ls_favs')||'[]');
let data={};
let curMatchId=null, ovTab='events';
let srchOpen=false;

// ── Dates ──────────────────────────────────────────────────────────────────
const DATES=(()=>{
  const a=[];const now=new Date();
  for(let i=-2;i<=3;i++){
    const d=new Date(now);d.setDate(now.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    a.push({key:`${y}${m}${day}`,label:i===-2?'Ant.':i===-1?'Ayer':i===0?'Hoy':i===1?'Mañ.':`${d.getDate()}/${d.getMonth()+1}`,isToday:i===0});
  }
  return a;
})();

function buildDates(){
  $('dates').innerHTML=DATES.map((d,i)=>`<div class="dchip ${i===dateIdx?'active':''} ${d.isToday?'today':''}" onclick="pickDate(${i})">${d.label}</div>`).join('');
}
function pickDate(i){dateIdx=i;buildDates();loadSport(sport)}

// ── Sport ──────────────────────────────────────────────────────────────────
function setSport(s){
  sport=s;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.sp===s));
  $('filters').style.display=s==='soccer'?'flex':'none';
  loadSport(s);
}
function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.fc').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if(sport==='soccer') renderSoccer();
}
function setNav(n,el){
  nav=n;
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(n==='scores') loadSport(sport);
  else if(n==='favorites') renderFavs();
  else $('content').innerHTML=`<div class="empty"><span class="emico">🚧</span><div class="emtxt">Próximamente</div></div>`;
}
function loadSport(s){
  if(s==='soccer') loadSoccer();
  else if(s==='basketball') loadBball();
  else if(s==='tennis') loadTennis();
  else if(s==='mma') loadMMA();
}

// ── Skeleton ───────────────────────────────────────────────────────────────
function showSk(){
  $('content').innerHTML=`<div style="display:flex;flex-direction:column;gap:1px">
    <div class="sk" style="height:38px;border-radius:0"></div>
    <div class="sk" style="height:70px;border-radius:0"></div>
    <div class="sk" style="height:70px;border-radius:0"></div>
    <div class="sk" style="height:70px;border-radius:0"></div>
    <div class="sk" style="height:38px;border-radius:0;margin-top:4px"></div>
    <div class="sk" style="height:70px;border-radius:0"></div>
    <div class="sk" style="height:70px;border-radius:0"></div>
  </div>`;
}

// ── Soccer ─────────────────────────────────────────────────────────────────
const LEAGUES=[
  {id:'fifa.world',name:'Mundial 2026',flag:'🌍'},
  {id:'conmebol.libertadores',name:'Copa Libertadores',flag:'🌎'},
  {id:'conmebol.sudamericana',name:'Copa Sudamericana',flag:'🌎'},
  {id:'uefa.champions',name:'Champions League',flag:'⭐'},
  {id:'uefa.europa',name:'Europa League',flag:'🔵'},
  {id:'esp.1',name:'La Liga',flag:'🇪🇸'},
  {id:'eng.1',name:'Premier League',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {id:'ger.1',name:'Bundesliga',flag:'🇩🇪'},
  {id:'ita.1',name:'Serie A',flag:'🇮🇹'},
  {id:'fra.1',name:'Ligue 1',flag:'🇫🇷'},
  {id:'usa.1',name:'MLS',flag:'🇺🇸'},
  {id:'arg.1',name:'Liga Argentina',flag:'🇦🇷'},
  {id:'chi.1',name:'Primera Chile',flag:'🇨🇱'},
  {id:'chi.copa',name:'Copa Chile',flag:'🇨🇱'},
  {id:'bra.1',name:'Brasileirao',flag:'🇧🇷'},
  {id:'mex.1',name:'Liga MX',flag:'🇲🇽'},
  {id:'col.1',name:'Liga Colombia',flag:'🇨🇴'},
];

async function loadSoccer(){
  showSk();
  const dk=DATES[dateIdx].key;
  const res=await Promise.allSettled(
    LEAGUES.map(l=>fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${l.id}/scoreboard?dates=${dk}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>({...l,events:(d?.events||[]).map(e=>({...e,_lid:l.id,_ln:l.name}))}))
    )
  );
  data.soccer=res.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
  renderSoccer();
}

function filt(evts){
  if(filter==='live') return evts.filter(e=>e.status?.type?.state==='in');
  if(filter==='upcoming') return evts.filter(e=>e.status?.type?.state==='pre');
  if(filter==='finished') return evts.filter(e=>e.status?.type?.state==='post');
  return evts;
}

function renderSoccer(){
  const c=$('content');
  const lgs=data.soccer||[];
  let html='';
  for(const lg of lgs){
    const evts=filt(lg.events||[]);
    if(!evts.length) continue;
    html+=`<div><div class="lghdr" onclick="toggleLg(this)">
      <span class="lgflag">${lg.flag}</span>
      <span class="lgname">${lg.name}</span>
      <span class="lgcount">${evts.length}</span>
      <span class="lgchev">▼</span>
    </div><div class="lgmatches">`;
    for(const ev of evts) html+=soccerCard(ev);
    html+=`</div></div>`;
  }
  c.innerHTML=html||`<div class="empty"><span class="emico">⚽</span><div class="emtxt">No hay partidos para esta fecha</div></div>`;
}

function soccerCard(ev){
  const comp=ev.competitions?.[0];
  const home=comp?.competitors?.find(c=>c.homeAway==='home')||comp?.competitors?.[0];
  const away=comp?.competitors?.find(c=>c.homeAway==='away')||comp?.competitors?.[1];
  if(!home||!away) return '';
  const isLive=ev.status?.type?.state==='in';
  const isFin=ev.status?.type?.state==='post';
  const hs=home.score||'0',as=away.score||'0';
  const hw=isFin&&parseInt(hs)>parseInt(as);
  const aw=isFin&&parseInt(as)>parseInt(hs);
  const t=ev.date?new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
  const min=ev.status?.displayClock||'';
  const isFav=favs.includes(ev.id);
  return `${isLive?'<div class="lstrip"></div>':''}
  <div class="mcard ${isLive?'live-card':''}" onclick="openMatch('${ev.id}','soccer')">
    <div class="mtime">
      ${isLive?`<div class="mtime-l live">LIVE</div><div class="mtime-min">${min}'</div>`:
        isFin?`<div class="mtime-fin">FIN</div>`:
        `<div class="mtime-l">${t}</div>`}
    </div>
    <div class="mteams">
      <div class="mteam">${teamFlag(home.team)}<div class="mname ${hw?'w':''}">${esc(home.team?.displayName||'Local')}</div></div>
      <div class="mteam">${teamFlag(away.team)}<div class="mname ${aw?'w':''}">${esc(away.team?.displayName||'Visit.')}</div></div>
    </div>
    <div class="mscores">
      <div class="mscore ${hw?'w':''} ${isLive?'live':''}">${isLive||isFin?hs:''}</div>
      <div class="mscore ${aw?'w':''} ${isLive?'live':''}">${isLive||isFin?as:''}</div>
    </div>
    <div class="mfav ${isFav?'on':''}" onclick="event.stopPropagation();toggleFav('${ev.id}',this)">${isFav?'★':'☆'}</div>
  </div>`;
}

// ── Basketball ─────────────────────────────────────────────────────────────
async function loadBball(){
  showSk();
  const dk=DATES[dateIdx].key;
  const res=await Promise.allSettled([
    {id:'nba',name:'NBA',flag:'🇺🇸'},{id:'wnba',name:'WNBA',flag:'♀️'}
  ].map(l=>fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/${l.id}/scoreboard?dates=${dk}`)
    .then(r=>r.ok?r.json():null).then(d=>({...l,events:d?.events||[]}))));
  data.basketball=res.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
  let html='';
  for(const lg of data.basketball){
    if(!lg.events.length) continue;
    html+=`<div><div class="lghdr" onclick="toggleLg(this)">
      <span class="lgflag">${lg.flag}</span><span class="lgname">${lg.name}</span>
      <span class="lgcount">${lg.events.length}</span><span class="lgchev">▼</span>
    </div><div class="lgmatches">`;
    for(const ev of lg.events){
      const comp=ev.competitions?.[0];
      const home=comp?.competitors?.find(c=>c.homeAway==='home')||comp?.competitors?.[0];
      const away=comp?.competitors?.find(c=>c.homeAway==='away')||comp?.competitors?.[1];
      if(!home||!away) continue;
      const isLive=ev.status?.type?.state==='in';
      const isFin=ev.status?.type?.state==='post';
      const hs=home.score||'0',as=away.score||'0';
      const hw=isFin&&parseInt(hs)>parseInt(as),aw=isFin&&parseInt(as)>parseInt(hs);
      const per=ev.status?.period?`Q${ev.status.period}`:'';
      const clk=ev.status?.displayClock||'';
      const t=ev.date?new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
      html+=`${isLive?'<div class="lstrip"></div>':''}
      <div class="mcard ${isLive?'live-card':''}">
        <div class="mtime">${isLive?`<div class="mtime-l live">${per}</div><div class="mtime-min">${clk}</div>`:isFin?`<div class="mtime-fin">FIN</div>`:`<div class="mtime-l">${t}</div>`}</div>
        <div class="mteams">
          <div class="mteam">${teamFlag(home.team)}<div class="mname ${hw?'w':''}">${esc(home.team?.displayName||'Local')}</div></div>
          <div class="mteam">${teamFlag(away.team)}<div class="mname ${aw?'w':''}">${esc(away.team?.displayName||'Visit.')}</div></div>
        </div>
        <div class="mscores">
          <div class="mscore ${hw?'w':''} ${isLive?'live':''}">${isLive||isFin?hs:''}</div>
          <div class="mscore ${aw?'w':''} ${isLive?'live':''}">${isLive||isFin?as:''}</div>
        </div>
        <div class="mfav" onclick="event.stopPropagation();toggleFav('${ev.id}',this)">☆</div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  $('content').innerHTML=html||`<div class="empty"><span class="emico">🏀</span><div class="emtxt">No hay partidos de básquet hoy</div></div>`;
}

// ── Tennis ─────────────────────────────────────────────────────────────────
async function loadTennis(){
  showSk();
  const c=$('content');
  // Intentar múltiples endpoints ESPN para tenis
  const eps=[
    {url:'https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard',tour:'ATP'},
    {url:'https://site.api.espn.com/apis/site/v2/sports/tennis/wta/scoreboard',tour:'WTA'},
    {url:'https://site.api.espn.com/apis/site/v2/sports/tennis/atp-singles/scoreboard',tour:'ATP'},
    {url:'https://site.api.espn.com/apis/site/v2/sports/tennis/wta-singles/scoreboard',tour:'WTA'},
  ];
  let allEvts=[];
  for(const ep of eps){
    try{
      const r=await fetch(ep.url,{headers:{'User-Agent':'Mozilla/5.0'}});
      if(!r.ok) continue;
      const d=await r.json();
      const evts=(d.events||[]).filter(e=>e.status?.type?.state!=='post');
      if(evts.length) { evts.forEach(e=>allEvts.push({...e,_tour:ep.tour})); break; }
    }catch(e){}
  }
  // Si ESPN no tiene datos, intentar la scoreboard general
  if(!allEvts.length){
    try{
      const r=await fetch('https://site.web.api.espn.com/apis/v2/scoreboard/header?sport=tennis&league=atp');
      if(r.ok){
        const d=await r.json();
        const evts=d.sports?.[0]?.leagues?.[0]?.events||[];
        evts.forEach(e=>allEvts.push({...e,_tour:'ATP'}));
      }
    }catch(e){}
  }
  if(!allEvts.length){
    c.innerHTML=`<div class="empty"><span class="emico">🎾</span><div class="emtxt">No hay partidos de tenis en este momento.<br><br>Vuelve durante un torneo activo.</div></div>`;
    return;
  }
  // Agrupar por torneo
  const byT={};
  for(const ev of allEvts){
    const k=ev.name||ev._tour;
    if(!byT[k]) byT[k]={name:k,tour:ev._tour,evts:[]};
    byT[k].evts.push(ev);
  }
  let html='';
  for(const [,td] of Object.entries(byT)){
    html+=`<div class="tennis-section-title">🎾 ${esc(td.name)} <span style="font-size:11px;color:var(--t3);font-weight:600">${td.tour}</span></div>`;
    for(const ev of td.evts){
      const comp=ev.competitions?.[0];
      const p1=comp?.competitors?.[0],p2=comp?.competitors?.[1];
      if(!p1||!p2) continue;
      const n1=p1.athlete?.displayName||p1.team?.displayName||'Jugador 1';
      const n2=p2.athlete?.displayName||p2.team?.displayName||'Jugador 2';
      const isLive=ev.status?.type?.state==='in';
      const isFin=ev.status?.type?.state==='post';
      const s1=p1.score||'',s2=p2.score||'';
      const t=ev.date?new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
      const w1=isFin&&p1.winner,w2=isFin&&p2.winner;
      html+=`${isLive?'<div class="lstrip"></div>':''}
      <div class="tennis-card">
        <div class="mtime">${isLive?'<div class="mtime-l live">LIVE</div>':isFin?'<div class="mtime-fin">FIN</div>':`<div class="mtime-l">${t}</div>`}</div>
        <div class="tennis-players">

// ── Formation / Lineup ─────────────────────────────────────────────────────
async function fetchLineup(eventId,lid,homeComp,awayComp){
  const inner=$('lineup-inner');
  if(!inner) return;
  try{
    const urls=[
      `https://site.api.espn.com/apis/site/v2/sports/soccer/${lid}/summary?event=${eventId}`,
      `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`,
    ];
    let summary=null;
    for(const url of urls){
      try{const r=await fetch(url);if(r.ok){summary=await r.json();break;}}catch(e){}
    }
    const rosters=summary?.rosters||[];
    if(!rosters.length){
      inner.innerHTML=`<div class="empty" style="padding:40px"><span class="emico">👥</span><div class="emtxt">Alineación no disponible para este partido</div></div>`;
      return;
    }
    let html='<div class="pitch-wrap">';
    // Pitch visual
    html+=buildPitch(rosters);
    html+='</div>';
    inner.innerHTML=html;
  }catch(e){
    if(inner) inner.innerHTML=`<div class="empty" style="padding:40px"><span class="emico">⚠️</span><div class="emtxt">No se pudo cargar</div></div>`;
  }
}

function posGroup(pos){
  const p=(pos||'').toUpperCase();
  if(p.includes('GK')||p==='G') return 'GK';
  if(p.includes('CB')||p.includes('LB')||p.includes('RB')||p.includes('WB')||p==='D'||p.includes('DC')||p.includes('DL')||p.includes('DR')) return 'DEF';
  if(p.includes('DM')||p.includes('CM')||p.includes('AM')||p.includes('LM')||p.includes('RM')||p==='M'||p.includes('MC')||p.includes('ML')||p.includes('MR')) return 'MID';
  return 'FWD';
}

// Build a visual pitch with players placed by formation
function buildPitch(rosters){
  const teamColors=[
    {bg:'#3366ff',txt:'#fff'},  // home = blue
    {bg:'#ff3333',txt:'#fff'},  // away = red
  ];

  // Build players HTML for pitch
  let playersOnPitch='';
  let benchHtml='';

  for(let ri=0;ri<rosters.length;ri++){
    const roster=rosters[ri];
    const color=teamColors[ri]||teamColors[0];
    const tname=roster.team?.displayName||'';
    const entries=roster.roster||[];
    const starters=entries.filter(e=>e.starter!==false&&!e.didNotPlay);
    const bench=entries.filter(e=>e.starter===false&&!e.didNotPlay);

    // Group starters by position
    const byPos={GK:[],DEF:[],MID:[],FWD:[]};
    for(const e of starters){
      const pg=posGroup(e.position?.abbreviation||'');
      byPos[pg].push(e);
    }

    // Home (ri=0): ocupa mitad INFERIOR del campo (y: 55% → 97%)
    // GK en el fondo (97%), líneas hacia arriba en su mitad
    // Away (ri=1): ocupa mitad SUPERIOR del campo (y: 3% → 45%)
    // GK en la cima (3%), líneas hacia abajo en su mitad
    const rowY = ri===0
      ? {GK:95, DEF:80, MID:67, FWD:57}
      : {GK:5,  DEF:20, MID:33, FWD:43};

    for(const [pg,players] of Object.entries(byPos)){
      if(!players.length) continue;
      const y=rowY[pg];
      const n=players.length;
      players.forEach((e,i)=>{
        const x=Math.round((i+1)/(n+1)*100);
        const a=e.athlete||{};
        const stats=e.stats||[];
        const sm={};for(const s of stats) sm[s.name]=s.displayValue||s.value||'0';
        const goals=sm.goals||sm.goalsScored||'';
        const yellows=sm.yellowCards||'';
        const reds=sm.redCards||'';
        const jersey=e.jersey||'';
        const name=a.displayName||a.shortName||a.lastName||'?';
        const shortName=name.split(' ').slice(-1)[0];
        const pkey=`p_${ri}_${pg}_${i}`;
        window._pc[pkey]={name,pos:pg,stats,jersey};

        playersOnPitch+=`<div class="pitch-player" style="left:${x}%;top:${y}%" onclick="showPlayer('${pkey}')">
          <div class="pp-avatar" style="background:${color.bg};color:${color.txt}">
            <span class="pp-num">${jersey}</span>
            ${goals&&goals!=='0'?'<div class="pp-badge">⚽</div>':''}
            ${yellows&&yellows!=='0'?'<div class="pp-badge" style="background:#ffcc00">🟨</div>':''}
            ${reds&&reds!=='0'?'<div class="pp-badge" style="background:#ff3344">🟥</div>':''}
          </div>
          <div class="pp-name">${esc(shortName)}</div>
        </div>`;
      });
    }

    // Bench
    if(bench.length){
      benchHtml+=`<div class="bench-section" style="padding:0 20px">
        <div class="bench-title">${esc(tname)} — Suplentes <span></span></div>`;
      for(const e of bench){
        const a=e.athlete||{};
        const stats=e.stats||[];
        const sm={};for(const s of stats) sm[s.name]=s.displayValue||s.value||'0';
        const goals=sm.goals||sm.goalsScored||'';
        const assists=sm.assists||'';
        const yellows=sm.yellowCards||'';
        const reds=sm.redCards||'';
        const rating=sm.rating||'';
        const pos=e.position?.abbreviation||'';
        const pg=posGroup(pos);
        const name=a.displayName||'?';
        const pkey=`bench_${ri}_${e.jersey||Math.random()}`;
        window._pc[pkey]={name,pos:pg,stats,jersey:e.jersey||''};
        benchHtml+=`<div class="bench-player" onclick="showPlayer('${pkey}')">
          <div class="bnum">${e.jersey||''}</div>
          <div class="bpos ${pg}">${pos||pg}</div>
          <div class="bname">${esc(name)}</div>
          <div class="bbadges">
            ${goals&&goals!=='0'?`<span class="bbadge goal">⚽${goals}</span>`:''}
            ${assists&&assists!=='0'?`<span class="bbadge assist">🅰️${assists}</span>`:''}
            ${yellows&&yellows!=='0'?`<span class="bbadge y">🟨</span>`:''}
            ${reds&&reds!=='0'?`<span class="bbadge r">🟥</span>`:''}
            ${rating&&rating!=='0'?`<span class="bbadge rat">${parseFloat(rating).toFixed(1)}</span>`:''}
          </div>
          <div class="barrow">›</div>
        </div>`;
      }
      benchHtml+='</div>';
    }
  }

  // Team name labels on pitch
  const homeName=rosters[0]?.team?.displayName||'Local';
  const awayName=rosters[1]?.team?.displayName||'Visit.';

  return `
  <div class="pitch-title">Alineación <span></span></div>
  <div class="pitch">
    <div class="pitch-lines">${pitchSVG()}</div>
    <!-- Team labels -->
    <div style="position:absolute;top:4%;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;color:rgba(255,165,0,.8);text-transform:uppercase;letter-spacing:.06em;text-shadow:0 1px 3px #000a;white-space:nowrap">${esc(awayName)}</div>
    <div style="position:absolute;bottom:4%;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;color:rgba(100,180,255,.8);text-transform:uppercase;letter-spacing:.06em;text-shadow:0 1px 3px #000a;white-space:nowrap">${esc(homeName)}</div>
    <div class="pitch-players">${playersOnPitch}</div>
  </div>
  ${benchHtml}`;
}

    <rect x="5" y="5" width="90" height="144" rx="2" fill="none" stroke="white" stroke-width=".8"/>

async function showTeamSchedule(teamId, lid){

  const pp=$('pp');
  pp.innerHTML=`<div class="pphdr">
    <div class="ovback" onclick="closePP()">←</div>

    <div class="sk" style="height:70px;border-radius:12px"></div>
  </div>`;
  pp.classList.add('open');

  try{
    // Intentar múltiples endpoints para obtener el calendario del equipo
    let events=[], teamName='Equipo', teamLogo='';
    const urls=[
      `https://site.api.espn.com/apis/site/v2/sports/soccer/${lid}/teams/${teamId}/schedule`,
      `https://site.api.espn.com/apis/site/v2/sports/soccer/${lid}/scoreboard`,
    ];
    
    // Primer intento: schedule del equipo
    try{
      const r=await fetch(urls[0]);
      if(r.ok){
        const d=await r.json();
        teamName=d.team?.displayName||'Equipo';
        teamLogo=d.team?.logos?.[0]?.href||'';
        // Incluir todos los eventos (pasados recientes + futuros)
        const allEvs=d.events||[];

        events=allEvs.filter(e=>e.status?.type?.state==='pre'||e.status?.type?.state==='in');

        if(!events.length) events=allEvs.filter(e=>e.status?.type?.state==='post').slice(-5);
      }
    }catch(e){}
    
    // Si el primer endpoint falla, buscar en el scoreboard general
    if(!events.length){
      try{
        // Buscar próximos en el scoreboard general con fechas futuras
        const futureKeys=[];
        for(let i=1;i<=14;i++){
          const d=new Date();d.setDate(d.getDate()+i);
          const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
          futureKeys.push(`${y}${m}${day}`);
        }
        for(const dk of futureKeys.slice(0,7)){
          const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${lid}/scoreboard?dates=${dk}`);
          if(!r.ok) continue;
          const d=await r.json();
          const teamEvs=(d.events||[]).filter(ev=>
            ev.competitions?.[0]?.competitors?.some(c=>c.team?.id===teamId||c.id===teamId)
          );
          events.push(...teamEvs);
          if(events.length>=3) break;
        }
      }catch(e){}
    }

    pp.querySelector('.ppname h3').textContent=teamName;
    pp.querySelector('.ppname small').textContent=events.some(e=>e.status?.type?.state==='pre')?'Próximos partidos':'Últimos partidos';

    const sched=$('team-sched');
    if(!events.length){
      sched.innerHTML=`<div class="empty"><span class="emico" style="font-size:32px">📅</span><div class="emtxt">No se encontraron partidos para este equipo en esta liga</div></div>`;
      return;
    }

    sched.innerHTML=events.slice(0,8).map(ev=>{
      const comp=ev.competitions?.[0];
      const home=comp?.competitors?.find(c=>c.homeAway==='home')||comp?.competitors?.[0];
      const away=comp?.competitors?.find(c=>c.homeAway==='away')||comp?.competitors?.[1];
      if(!home||!away) return '';
      const isLive=ev.status?.type?.state==='in';
      const dateStr=ev.date?new Date(ev.date).toLocaleDateString('es',{weekday:'short',day:'numeric',month:'short'})+' '+new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
      const hlg=home.team?.logos?.[0]?.href||'';
      const alg=away.team?.logos?.[0]?.href||'';
      const hs=home.score||'',as=away.score||'';
      return `<div style="background:var(--bg3);border-radius:12px;padding:14px 16px;border:1px solid var(--line2)">
        <div style="font-size:10px;color:var(--t3);font-family:var(--mono);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">${isLive?'<span style="color:var(--live)">🔴 EN VIVO</span>':dateStr}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:20px;height:20px;border-radius:50%;background:var(--bg4);overflow:hidden;flex-shrink:0">${hlg?`<img src="${hlg}" style="width:100%;height:100%;object-fit:cover">`:''}</div>
              <span style="font-size:13px;font-weight:600">${esc(home.team?.displayName||'Local')}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:20px;height:20px;border-radius:50%;background:var(--bg4);overflow:hidden;flex-shrink:0">${alg?`<img src="${alg}" style="width:100%;height:100%;object-fit:cover">`:''}</div>
              <span style="font-size:13px;font-weight:600">${esc(away.team?.displayName||'Visit.')}</span>
            </div>
          </div>
          ${isLive||hs?`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${isLive?'var(--live)':'var(--text)'}">${hs||'-'}</div>
            <div style="font-family:var(--mono);font-size:16px;font-weight:700;color:${isLive?'var(--live)':'var(--text)'}">${as||'-'}</div>
          </div>`:''}
        </div>
      </div>`;
    }).join('');
  }catch(e){
    const sched=$('team-sched');
    if(sched) sched.innerHTML=`<div class="empty"><span class="emico" style="font-size:32px">⚠️</span><div class="emtxt">No se pudo cargar el calendario</div></div>`;
  }
}

function closeOverlay(){$('overlay').classList.remove('open');curMatchId=null}

// ── Favorites ──────────────────────────────────────────────────────────────
function toggleFav(id,el){
  const i=favs.indexOf(id);
  if(i===-1){favs.push(id);el.textContent='★';el.classList.add('on');}
  else{favs.splice(i,1);el.textContent='☆';el.classList.remove('on');}
  localStorage.setItem('ls_favs',JSON.stringify(favs));
}
function toggleOvFav(){if(!curMatchId)return;toggleFav(curMatchId,$('ovfav'));}
function renderFavs(){
  $('content').innerHTML=`<div class="empty"><span class="emico">⭐</span><div class="emtxt">${favs.length?'Tus favoritos aparecen aquí':'Toca ☆ en cualquier partido para guardarlo aquí'}</div></div>`;
}

// ── Search ─────────────────────────────────────────────────────────────────
function toggleSearch(){
  srchOpen=!srchOpen;
  $('srchwrap').style.display=srchOpen?'block':'none';
  if(srchOpen) $('srchinp').focus();
}
function doSearch(){
  const q=$('srchinp').value.toLowerCase().trim();
  if(!q){
    document.querySelectorAll('.mcard,.tennis-card').forEach(c=>c.style.display='flex');
    document.querySelectorAll('.lgmatches').forEach(lm=>lm.style.display='block');
    return;
  }
  // Mostrar/ocultar cards
  document.querySelectorAll('.mcard,.tennis-card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(q)?'flex':'none');
  // Mostrar ligas que tengan resultados
  document.querySelectorAll('.lghdr').forEach(hdr=>{
    const matches=hdr.nextElementSibling;
    if(!matches) return;
    const visible=[...matches.querySelectorAll('.mcard,.tennis-card')].some(c=>c.style.display!=='none');
    hdr.style.display=visible?'flex':'none';
    if(matches) matches.style.display=visible?'block':'none';
  });
  // Si busca Colo-Colo o equipo chileno, cargar liga chilena
  const CHILEAN=['colo','colo-colo','universidad de chile','u de chile','la u','audax','palestino','huachipato','everton','curicó','iquique','cobreloa','cobresal','deportes antofagasta'];
  if(CHILEAN.some(t=>q.includes(t)||t.includes(q))){
    loadChileanSearch(q);
  }
}

async function loadChileanSearch(q){
  // Cargar las próximas 7 fechas de la Primera Chile buscando al equipo
  const dates=[];
  for(let i=-3;i<=7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
    dates.push(`${y}${m}${day}`);
  }
  for(const dk of dates){
    try{
      const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/chi.1/scoreboard?dates=${dk}`);
      if(!r.ok) continue;
      const d=await r.json();
      const evts=(d.events||[]).filter(ev=>
        ev.competitions?.[0]?.competitors?.some(c=>
          (c.team?.displayName||'').toLowerCase().includes(q)||
          (c.team?.name||'').toLowerCase().includes(q)
        )
      );
      if(!evts.length) continue;
      // Mostrar resultados
      const c=$('content');
      const existing=document.getElementById('chile-search-results');
      if(!existing){
        const div=document.createElement('div');
        div.id='chile-search-results';
        div.style.cssText='background:var(--bg2);border-bottom:1px solid var(--line)';
        div.innerHTML=`<div class="lghdr" style="position:sticky;top:0"><span class="lgflag">🇨🇱</span><span class="lgname">Primera Chile</span></div><div class="lgmatches" id="chile-results-inner"></div>`;
        c.prepend(div);
      }
      const inner=document.getElementById('chile-results-inner');
      if(inner){
        evts.forEach(ev=>{inner.innerHTML+=soccerCard({...ev,_lid:'chi.1',_ln:'Primera Chile'});});
      }
    }catch(e){}
  }
}

// ── Utils ──────────────────────────────────────────────────────────────────
function toggleLg(hdr){
  hdr.classList.toggle('collapsed');
  const m=hdr.nextElementSibling;
  if(m) m.style.display=hdr.classList.contains('collapsed')?'none':'block';
}
