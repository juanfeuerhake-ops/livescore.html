<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LiveScore</title>
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiveScore">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --bg2:      #0e0e1a;
  --bg3:      #141420;
  --bg4:      #1a1a2a;
  --bg5:      #20203a;
  --line:     #ffffff0f;
  --line2:    #ffffff18;
  --text:     #f0f0ff;
  --text2:    #a0a0c0;
  --text3:    #606080;
  --green:    #00ff88;
  --green2:   #00cc6a;
  --red:      #ff4466;
  --amber:    #ffcc00;
  --blue:     #4488ff;
  --purple:   #aa66ff;
  --live:     #ff3355;
  --font:     'Plus Jakarta Sans', system-ui, sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --r:        14px;
  --r2:       20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ── App shell ── */
#app { display: flex; flex-direction: column; height: 100%; max-width: 430px; margin: 0 auto; position: relative; }

/* ── Top bar ── */
.topbar {
  padding: calc(var(--safe-top) + 14px) 20px 0;
  background: var(--bg);
  z-index: 20;
  flex-shrink: 0;
}
.topbar-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo em { font-style: normal; background: linear-gradient(135deg, var(--green) 0%, #00aaff 100%); -webkit-background-clip: text; }
.topbar-btns { display: flex; gap: 8px; }
.tbtn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--line2);
  color: var(--text2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .15s;
}
.tbtn:active { background: var(--bg4); transform: scale(.93); }

/* ── Sport pills ── */
.sport-pills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 16px;
}
.sport-pills::-webkit-scrollbar { display: none; }
.sport-pill {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg3);
  border: 1.5px solid var(--line2);
  color: var(--text2);
  transition: all .2s;
}
.sport-pill.active {
  background: var(--green);
  border-color: var(--green);
  color: #000;
}
.sport-pill .live-badge {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--live);
  animation: blink 1.2s infinite;
}
.sport-pill.active .live-badge { background: #000a; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Date strip ── */
.date-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 20px 14px;
  background: var(--bg);
  flex-shrink: 0;
}
.date-strip::-webkit-scrollbar { display: none; }
.date-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text3);
  border: 1.5px solid transparent;
  transition: all .15s;
}
.date-chip:hover { color: var(--text2); }
.date-chip.active {
  background: var(--bg4);
  border-color: var(--line2);
  color: var(--text);
}
.date-chip.today { color: var(--green); }
.date-chip.active.today { background: var(--green)18; border-color: var(--green)44; }

/* ── Filter chips ── */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 0 20px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.filter-row::-webkit-scrollbar { display: none; }
.fchip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text3);
  border: 1.5px solid transparent;
  transition: all .15s;
}
.fchip.active { background: var(--bg4); border-color: var(--line2); color: var(--text2); }
.fchip.live-chip.active { background: var(--live)18; border-color: var(--live)44; color: var(--live); }

/* ── Search ── */
.search-wrap { padding: 0 20px 14px; flex-shrink: 0; }
.search-inp {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--line2);
  border-radius: 12px;
  padding: 11px 16px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.search-inp::placeholder { color: var(--text3); }
.search-inp:focus { border-color: var(--green)66; }

/* ── Content scroll ── */
.content {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  padding-bottom: calc(70px + var(--safe-bot));
}
.content::-webkit-scrollbar { display: none; }

/* ── League group ── */
.lg-group { margin-bottom: 2px; }
.lg-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: var(--bg2);
  cursor: pointer;
  position: sticky;
  top: 0;
  z-index: 5;
  border-bottom: 1px solid var(--line);
}
.lg-flag { font-size: 15px; }
.lg-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); flex: 1; }
.lg-count { font-family: var(--mono); font-size: 10px; color: var(--text3); background: var(--bg4); padding: 2px 7px; border-radius: 10px; }
.lg-chev { font-size: 9px; color: var(--text3); transition: transform .2s; }
.lg-header.collapsed .lg-chev { transform: rotate(-90deg); }

/* ── Match card ── */
.match-card {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  gap: 12px;
  transition: background .1s;
  position: relative;
}
.match-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: var(--green);
  transition: width .15s;
}
.match-card:active { background: var(--bg3); }
.match-card:active::after { width: 3px; }

/* Time col */
.mc-time { width: 40px; flex-shrink: 0; text-align: center; }
.mc-time-label { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.mc-time-label.live { color: var(--live); font-weight: 700; }
.mc-time-min { font-family: var(--mono); font-size: 10px; color: var(--live); margin-top: 1px; }
.mc-time-fin { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }

/* Teams col */
.mc-teams { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 7px; }
.mc-team { display: flex; align-items: center; gap: 9px; }
.mc-logo {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--bg4);
  flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.mc-logo img { width: 100%; height: 100%; object-fit: cover; }
.mc-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); }
.mc-name.w { font-weight: 700; color: var(--text); }

/* Score col */
.mc-scores { display: flex; flex-direction: column; gap: 7px; align-items: center; }
.mc-score {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--text3);
  min-width: 22px;
  text-align: center;
  line-height: 22px;
}
.mc-score.w { color: var(--text); }
.mc-score.live { color: var(--live); }

/* Fav */
.mc-fav { font-size: 16px; color: var(--text3); padding: 6px; flex-shrink: 0; transition: color .15s, transform .15s; }
.mc-fav.on { color: var(--amber); }
.mc-fav:active { transform: scale(1.3); }

/* Live indicator strip */
.live-strip { height: 2px; background: linear-gradient(90deg, var(--live), transparent); margin: 0; }

/* ── Overlay (match detail) ── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.overlay.open { transform: translateY(0); }

.ov-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.ov-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--line2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--text2);
}
.ov-league { flex: 1; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); }

/* ── Scoreboard hero ── */
.sb-hero {
  background: linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 100%);
  padding: 28px 24px 24px;
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.sb-hero::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, var(--green)0a 0%, transparent 70%);
  pointer-events: none;
}
.sb-status {
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.sb-status.live { color: var(--live); }
.sb-status.fin { color: var(--text3); }
.sb-status.pre { color: var(--text2); }
.sb-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.sb-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.sb-logo {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  border: 2px solid var(--line2);
  overflow: hidden;
}
.sb-logo img { width: 100%; height: 100%; object-fit: cover; }
.sb-tname { font-size: 13px; font-weight: 700; text-align: center; line-height: 1.3; }
.sb-center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.sb-scores { display: flex; align-items: center; gap: 6px; }
.sb-n {
  font-family: var(--mono);
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
}
.sb-n.live { color: var(--live); text-shadow: 0 0 20px var(--live)44; }
.sb-sep { font-family: var(--mono); font-size: 28px; color: var(--text3); }
.sb-time-badge {
  background: var(--live)18;
  border: 1px solid var(--live)44;
  color: var(--live);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}

/* ── Tabs inside overlay ── */
.ov-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--bg2);
  flex-shrink: 0;
}
.ov-tab {
  flex: 1;
  padding: 12px;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  text-transform: uppercase;
  letter-spacing: .05em;
  transition: all .15s;
}
.ov-tab.active { color: var(--green); border-bottom-color: var(--green); }

/* ── Events timeline ── */
.events-wrap { padding: 16px 20px; }
.event-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 4px;
  background: var(--bg3);
}
.ev-min { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 28px; flex-shrink: 0; text-align: right; }
.ev-icon { font-size: 16px; width: 28px; text-align: center; }
.ev-info { flex: 1; }
.ev-player { font-size: 13px; font-weight: 600; }
.ev-team { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* ── Stats ── */
.stats-wrap { padding: 16px 20px; }
.stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); text-align: center; margin-bottom: 12px; }
.stat-row { display: grid; grid-template-columns: 40px 1fr 40px; gap: 8px; align-items: center; margin-bottom: 10px; }
.stat-val { font-family: var(--mono); font-size: 13px; font-weight: 600; text-align: center; }
.stat-val.h { color: var(--blue); }
.stat-val.a { color: var(--purple); }
.stat-bars { display: flex; gap: 2px; height: 4px; border-radius: 2px; overflow: hidden; }
.stat-bar-h { background: var(--blue); border-radius: 2px 0 0 2px; }
.stat-bar-a { background: var(--purple); border-radius: 0 2px 2px 0; }
.stat-name { font-size: 11px; color: var(--text3); text-align: center; grid-column: 1/-1; margin-top: -6px; margin-bottom: 4px; }

/* ── Lineup ── */
.lineup-wrap { padding: 12px 0; }
.lineup-team-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.lineup-team-hdr img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
.player-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 20px;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid var(--line);
}
.player-row:active { background: var(--bg3); }
.player-row.bench { opacity: .6; }
.p-num { font-family: var(--mono); font-size: 12px; color: var(--text3); width: 20px; text-align: center; flex-shrink: 0; }
.p-pos {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 4px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}
.p-pos.GK { background: #ffcc0022; color: var(--amber); }
.p-pos.DEF { background: #4488ff22; color: var(--blue); }
.p-pos.MID { background: #aa66ff22; color: var(--purple); }
.p-pos.FWD { background: #00ff8822; color: var(--green); }
.p-name { flex: 1; font-size: 14px; font-weight: 500; }
.p-badges { display: flex; gap: 4px; flex-shrink: 0; }
.p-badge { font-size: 11px; padding: 2px 6px; border-radius: 6px; font-family: var(--mono); font-weight: 600; }
.p-badge.goal { background: #00ff8820; color: var(--green); }
.p-badge.assist { background: #4488ff20; color: var(--blue); }
.p-badge.yellow { background: #ffcc0030; color: var(--amber); }
.p-badge.red { background: #ff446630; color: var(--red); }
.p-badge.rating { background: var(--bg4); color: var(--text2); }
.p-arrow { color: var(--text3); font-size: 14px; flex-shrink: 0; }

/* ── Player detail panel ── */
#player-panel {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  max-width: 430px;
  margin: 0 auto;
  overflow-y: auto;
}
#player-panel.open { transform: translateX(0); }
.pp-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 5;
}
.pp-name { flex: 1; font-size: 17px; font-weight: 700; }
.pp-pos { font-size: 12px; color: var(--text3); }
.pp-stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  margin: 20px;
  border-radius: var(--r);
  overflow: hidden;
}
.pp-stat {
  background: var(--bg3);
  padding: 18px 12px;
  text-align: center;
}
.pp-stat-val { font-family: var(--mono); font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.pp-stat-val.green { color: var(--green); }
.pp-stat-val.blue { color: var(--blue); }
.pp-stat-val.amber { color: var(--amber); }
.pp-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }

/* ── MMA cards ── */
.mma-event-card {
  margin: 16px 20px;
  background: var(--bg3);
  border-radius: var(--r2);
  overflow: hidden;
  border: 1px solid var(--line2);
}
.mma-event-hdr {
  padding: 14px 18px;
  background: linear-gradient(135deg, #1a0a20, #200a15);
  border-bottom: 1px solid var(--line2);
}
.mma-event-name { font-size: 16px; font-weight: 800; letter-spacing: -.3px; }
.mma-event-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
.mma-fight {
  display: flex;
  align-items: center;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  gap: 12px;
}
.mma-fight:last-child { border-bottom: none; }
.mma-fighter { flex: 1; }
.mma-f-name { font-size: 14px; font-weight: 700; }
.mma-f-record { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
.mma-vs-block { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
.mma-vs { font-family: var(--mono); font-size: 11px; color: var(--text3); font-weight: 700; }
.mma-title-tag {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 2px 7px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--amber), #ff8800);
  color: #000;
}
.mma-weight { font-size: 10px; color: var(--text3); text-align: center; margin-top: 4px; }

/* ── Basketball score card ── */
.bball-live-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--live);
  background: var(--live)15;
  border: 1px solid var(--live)44;
  border-radius: 20px;
  padding: 2px 8px;
  margin-left: 6px;
}

/* ── Skeleton ── */
.sk { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%); background-size: 200%; animation: sk 1.2s infinite; border-radius: 8px; }
@keyframes sk { 0%{background-position:200%} 100%{background-position:-200%} }
.sk-card { height: 68px; margin-bottom: 1px; border-radius: 0; }
.sk-hdr { height: 38px; margin-bottom: 1px; border-radius: 0; }

/* ── Empty ── */
.empty { text-align: center; padding: 60px 24px; }
.empty-ico { font-size: 44px; margin-bottom: 14px; opacity: .5; }
.empty-txt { font-size: 14px; color: var(--text3); line-height: 1.6; }

/* ── Bottom nav ── */
.bnav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--bg2);
  border-top: 1px solid var(--line);
  display: flex;
  padding-bottom: var(--safe-bot);
  z-index: 50;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.bnav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 0 8px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  transition: color .15s;
}
.bnav-item.active { color: var(--green); }
.bnav-ico { font-size: 22px; }

/* ── Section title ── */
.section-ttl {
  padding: 20px 20px 12px;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -.3px;
}

/* ── Gradient divider ── */
.grad-div { height: 1px; background: linear-gradient(90deg, transparent, var(--line2), transparent); margin: 0 20px; }
</style>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-row1">
      <div class="logo">Live<em>Score</em></div>
      <div class="topbar-btns">
        <button class="tbtn" onclick="toggleSearch()" id="search-btn">🔍</button>
        <button class="tbtn">🔔</button>
      </div>
    </div>
    <div class="sport-pills" id="sport-pills">
      <button class="sport-pill active" data-sport="soccer" onclick="setSport('soccer')">
        ⚽ Fútbol <div class="live-badge"></div>
      </button>
      <button class="sport-pill" data-sport="basketball" onclick="setSport('basketball')">🏀 Básquet</button>
      <button class="sport-pill" data-sport="tennis" onclick="setSport('tennis')">🎾 Tenis</button>
      <button class="sport-pill" data-sport="mma" onclick="setSport('mma')">🥊 UFC</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap" id="search-wrap" style="display:none">
    <input class="search-inp" placeholder="Buscar equipo o partido..." id="search-inp" oninput="filterSearch()">
  </div>

  <!-- Date strip -->
  <div class="date-strip" id="date-strip"></div>

  <!-- Filters -->
  <div class="filter-row" id="filter-row">
    <button class="fchip active" onclick="setFilter('all',this)">Todos</button>
    <button class="fchip live-chip" onclick="setFilter('live',this)">🔴 En vivo</button>
    <button class="fchip" onclick="setFilter('upcoming',this)">Próximos</button>
    <button class="fchip" onclick="setFilter('finished',this)">Terminados</button>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div style="padding:20px;display:flex;flex-direction:column;gap:1px">
      <div class="sk sk-hdr"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-hdr" style="margin-top:8px"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bnav">
    <button class="bnav-item active" onclick="setNav('scores',this)"><span class="bnav-ico">📊</span>Scores</button>
    <button class="bnav-item" onclick="setNav('favorites',this)"><span class="bnav-ico">⭐</span>Favoritos</button>
    <button class="bnav-item" onclick="setNav('standings',this)"><span class="bnav-ico">🏆</span>Tablas</button>
    <button class="bnav-item" onclick="setNav('news',this)"><span class="bnav-ico">📰</span>Noticias</button>
  </nav>
</div>

<!-- Match detail overlay -->
<div class="overlay" id="overlay">
  <div class="ov-header">
    <div class="ov-back" onclick="closeOverlay()">←</div>
    <div class="ov-league" id="ov-league">Liga</div>
    <button class="tbtn" id="ov-fav" onclick="toggleOvFav()">☆</button>
  </div>
  <div class="content" id="ov-content"></div>
</div>

<!-- Player panel -->
<div id="player-panel"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let sport = 'soccer';
let dateIdx = 2;
let filter = 'all';
let nav = 'scores';
let favs = JSON.parse(localStorage.getItem('ls_favs') || '[]');
let matchData = {};
let currentMatchId = null;
let currentOvTab = 'events';
let searchOpen = false;
window._pCache = {};

// ── Dates ──────────────────────────────────────────────────────────────────
const DATES = (() => {
  const arr = [];
  const now = new Date();
  for (let i = -2; i <= 3; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    arr.push({
      key: `${y}${m}${day}`,
      iso: `${y}-${m}-${day}`,
      label: i===-2?'Ant.':i===-1?'Ayer':i===0?'Hoy':i===1?'Mañ.':`${d.getDate()}/${d.getMonth()+1}`,
      isToday: i===0
    });
  }
  return arr;
})();

function initDates() {
  document.getElementById('date-strip').innerHTML = DATES.map((d,i)=>`
    <div class="date-chip ${i===dateIdx?'active':''} ${d.isToday?'today':''}" onclick="pickDate(${i})">${d.label}</div>
  `).join('');
}

function pickDate(i) {
  dateIdx = i;
  initDates();
  loadSport(sport);
}

// ── Sport ──────────────────────────────────────────────────────────────────
function setSport(s) {
  sport = s;
  document.querySelectorAll('.sport-pill').forEach(p => p.classList.toggle('active', p.dataset.sport === s));
  document.getElementById('filter-row').style.display = s === 'soccer' ? 'flex' : 'none';
  loadSport(s);
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (sport === 'soccer') renderSoccer();
}

function setNav(n, el) {
  nav = n;
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (n === 'scores') loadSport(sport);
  else if (n === 'favorites') renderFavs();
  else if (n === 'standings') renderStandings();
  else renderPlaceholder(n);
}

function loadSport(s) {
  if (s === 'soccer') loadSoccer();
  else if (s === 'basketball') loadBball();
  else if (s === 'tennis') loadTennis();
  else if (s === 'mma') loadMMA();
}

// ── Loading ────────────────────────────────────────────────────────────────
function showSkeleton() {
  document.getElementById('content').innerHTML = `<div style="padding:0;display:flex;flex-direction:column;gap:1px;margin-top:0">
    <div class="sk sk-hdr"></div>
    <div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>
    <div class="sk sk-hdr" style="margin-top:4px"></div>
    <div class="sk sk-card"></div><div class="sk sk-card"></div>
  </div>`;
}

// ── Soccer ─────────────────────────────────────────────────────────────────
const LEAGUES = [
  {id:'fifa.world', name:'Mundial 2026', flag:'🌍'},
  {id:'conmebol.libertadores', name:'Copa Libertadores', flag:'🌎'},
  {id:'conmebol.sudamericana', name:'Copa Sudamericana', flag:'🌎'},
  {id:'uefa.champions', name:'Champions League', flag:'⭐'},
  {id:'uefa.europa', name:'Europa League', flag:'🔵'},
  {id:'esp.1', name:'La Liga', flag:'🇪🇸'},
  {id:'eng.1', name:'Premier League', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {id:'ger.1', name:'Bundesliga', flag:'🇩🇪'},
  {id:'ita.1', name:'Serie A', flag:'🇮🇹'},
  {id:'fra.1', name:'Ligue 1', flag:'🇫🇷'},
  {id:'usa.1', name:'MLS', flag:'🇺🇸'},
  {id:'arg.1', name:'Liga Argentina', flag:'🇦🇷'},
  {id:'chi.1', name:'Primera Chile', flag:'🇨🇱'},
  {id:'bra.1', name:'Brasileirao', flag:'🇧🇷'},
  {id:'mex.1', name:'Liga MX', flag:'🇲🇽'},
  {id:'col.1', name:'Liga Colombia', flag:'🇨🇴'},
];

async function loadSoccer() {
  showSkeleton();
  const dk = DATES[dateIdx].key;
  const results = await Promise.allSettled(
    LEAGUES.map(l => fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${l.id}/scoreboard?dates=${dk}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => ({...l, events: (d?.events||[]).map(e=>({...e,_lid:l.id,_lname:l.name}))}))
    )
  );
  matchData.soccer = results.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
  renderSoccer();
}

function filterEvts(evts) {
  if (filter==='live') return evts.filter(e=>e.status?.type?.state==='in');
  if (filter==='upcoming') return evts.filter(e=>e.status?.type?.state==='pre');
  if (filter==='finished') return evts.filter(e=>e.status?.type?.state==='post');
  return evts;
}

function renderSoccer() {
  const c = document.getElementById('content');
  const leagues = matchData.soccer||[];
  let html = '';
  for (const lg of leagues) {
    const evts = filterEvts(lg.events||[]);
    if (!evts.length) continue;
    html += `<div class="lg-group">
      <div class="lg-header" onclick="toggleLg(this)">
        <span class="lg-flag">${lg.flag}</span>
        <span class="lg-name">${lg.name}</span>
        <span class="lg-count">${evts.length}</span>
        <span class="lg-chev">▼</span>
      </div>
      <div class="lg-matches">`;
    for (const ev of evts) html += matchCard(ev, 'soccer');
    html += `</div></div>`;
  }
  c.innerHTML = html || `<div class="empty"><div class="empty-ico">⚽</div><div class="empty-txt">No hay partidos para esta fecha</div></div>`;
}

function matchCard(ev, sp) {
  const comp = ev.competitions?.[0];
  const home = comp?.competitors?.find(c=>c.homeAway==='home')||comp?.competitors?.[0];
  const away = comp?.competitors?.find(c=>c.homeAway==='away')||comp?.competitors?.[1];
  if (!home||!away) return '';
  const isLive = ev.status?.type?.state==='in';
  const isFin = ev.status?.type?.state==='post';
  const hs = home.score||'0', as = away.score||'0';
  const hw = isFin && parseInt(hs)>parseInt(as);
  const aw = isFin && parseInt(as)>parseInt(hs);
  const timeStr = ev.date ? new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}) : '';
  const hlg = home.team?.logos?.[0]?.href||'';
  const alg = away.team?.logos?.[0]?.href||'';
  const isFav = favs.includes(ev.id);
  const min = ev.status?.displayClock||'';
  return `${isLive?'<div class="live-strip"></div>':''}
  <div class="match-card" onclick="openMatch('${ev.id}','${sp}')">
    <div class="mc-time">
      ${isLive?`<div class="mc-time-label live">LIVE</div><div class="mc-time-min">${min}'</div>`:
        isFin?`<div class="mc-time-fin">FIN</div>`:
        `<div class="mc-time-label">${timeStr}</div>`}
    </div>
    <div class="mc-teams">
      <div class="mc-team">
        <div class="mc-logo">${hlg?`<img src="${hlg}" loading="lazy">`:'🏠'}</div>
        <div class="mc-name ${hw?'w':''}">${home.team?.displayName||'Local'}</div>
      </div>
      <div class="mc-team">
        <div class="mc-logo">${alg?`<img src="${alg}" loading="lazy">`:'✈️'}</div>
        <div class="mc-name ${aw?'w':''}">${away.team?.displayName||'Visitante'}</div>
      </div>
    </div>
    <div class="mc-scores">
      <div class="mc-score ${hw?'w':''} ${isLive?'live':''}">${isLive||isFin?hs:''}</div>
      <div class="mc-score ${aw?'w':''} ${isLive?'live':''}">${isLive||isFin?as:''}</div>
    </div>
    <div class="mc-fav ${isFav?'on':''}" onclick="event.stopPropagation();toggleFav('${ev.id}',this)">${isFav?'★':'☆'}</div>
  </div>`;
}

// ── Basketball ─────────────────────────────────────────────────────────────
async function loadBball() {
  showSkeleton();
  const dk = DATES[dateIdx].key;
  const bLeagues = [
    {id:'nba', name:'NBA', flag:'🇺🇸'},
    {id:'wnba', name:'WNBA', flag:'♀️'},
  ];
  const results = await Promise.allSettled(
    bLeagues.map(l => fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/${l.id}/scoreboard?dates=${dk}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>({...l, events:d?.events||[]}))
    )
  );
  matchData.basketball = results.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);
  const c = document.getElementById('content');
  let html = '';
  for (const lg of matchData.basketball) {
    if (!lg.events.length) continue;
    html += `<div class="lg-group">
      <div class="lg-header" onclick="toggleLg(this)">
        <span class="lg-flag">${lg.flag}</span>
        <span class="lg-name">${lg.name}</span>
        <span class="lg-count">${lg.events.length}</span>
        <span class="lg-chev">▼</span>
      </div>
      <div class="lg-matches">`;
    for (const ev of lg.events) {
      const comp = ev.competitions?.[0];
      const home = comp?.competitors?.find(c=>c.homeAway==='home')||comp?.competitors?.[0];
      const away = comp?.competitors?.find(c=>c.homeAway==='away')||comp?.competitors?.[1];
      if (!home||!away) continue;
      const isLive = ev.status?.type?.state==='in';
      const isFin = ev.status?.type?.state==='post';
      const hs = home.score||'0', as = away.score||'0';
      const hw = isFin&&parseInt(hs)>parseInt(as);
      const aw = isFin&&parseInt(as)>parseInt(hs);
      const period = ev.status?.period?`Q${ev.status.period}`:'';
      const clock = ev.status?.displayClock||'';
      const timeStr = ev.date?new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
      html += `${isLive?'<div class="live-strip"></div>':''}
      <div class="match-card">
        <div class="mc-time">
          ${isLive?`<div class="mc-time-label live">${period}</div><div class="mc-time-min">${clock}</div>`:
            isFin?`<div class="mc-time-fin">FIN</div>`:
            `<div class="mc-time-label">${timeStr}</div>`}
        </div>
        <div class="mc-teams">
          <div class="mc-team"><div class="mc-logo">🏠</div><div class="mc-name ${hw?'w':''}">${home.team?.displayName||'Local'}</div></div>
          <div class="mc-team"><div class="mc-logo">✈️</div><div class="mc-name ${aw?'w':''}">${away.team?.displayName||'Visitante'}</div></div>
        </div>
        <div class="mc-scores">
          <div class="mc-score ${hw?'w':''} ${isLive?'live':''}">${isLive||isFin?hs:''}</div>
          <div class="mc-score ${aw?'w':''} ${isLive?'live':''}">${isLive||isFin?as:''}</div>
        </div>
        <div class="mc-fav" onclick="event.stopPropagation();toggleFav('${ev.id}',this)">☆</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  c.innerHTML = html||`<div class="empty"><div class="empty-ico">🏀</div><div class="empty-txt">No hay partidos de básquet hoy</div></div>`;
}

// ── Tennis ─────────────────────────────────────────────────────────────────
async function loadTennis() {
  showSkeleton();
  const c = document.getElementById('content');
  const endpoints = [
    {url:'https://site.api.espn.com/apis/site/v2/sports/tennis/atp/scoreboard', tour:'ATP'},
    {url:'https://site.api.espn.com/apis/site/v2/sports/tennis/wta/scoreboard', tour:'WTA'},
  ];
  let allEvts = [];
  for (const ep of endpoints) {
    try {
      const r = await fetch(ep.url,{headers:{'User-Agent':'Mozilla/5.0'}});
      if (!r.ok) continue;
      const d = await r.json();
      (d.events||[]).forEach(e=>{ if(e.status?.type?.state!=='post') allEvts.push({...e,_tour:ep.tour}); });
    } catch(e){}
  }
  if (!allEvts.length) {
    c.innerHTML=`<div class="empty"><div class="empty-ico">🎾</div><div class="empty-txt">No hay partidos de tenis disponibles ahora</div></div>`;
    return;
  }
  const byT = {};
  for (const ev of allEvts) {
    const k = ev.name||ev._tour;
    if (!byT[k]) byT[k]={name:k,tour:ev._tour,evts:[]};
    byT[k].evts.push(ev);
  }
  let html='';
  for (const [,td] of Object.entries(byT)) {
    html+=`<div class="section-ttl">${td.name} <span style="font-size:13px;color:var(--text3);font-weight:500">${td.tour}</span></div>`;
    for (const ev of td.evts) {
      const comp=ev.competitions?.[0];
      const p1=comp?.competitors?.[0], p2=comp?.competitors?.[1];
      if (!p1||!p2) continue;
      const n1=p1.athlete?.displayName||p1.team?.displayName||'P1';
      const n2=p2.athlete?.displayName||p2.team?.displayName||'P2';
      const isLive=ev.status?.type?.state==='in';
      const s1=p1.score||'', s2=p2.score||'';
      const timeStr=ev.date?new Date(ev.date).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}):'';
      const round=comp?.notes?.[0]?.headline||'';
      html+=`${isLive?'<div class="live-strip"></div>':''}
      <div class="match-card">
        <div class="mc-time">${isLive?'<div class="mc-time-label live">LIVE</div>':`<div class="mc-time-label">${timeStr}</div>`}</div>
        <div class="mc-teams">
          <div class="mc-team"><div class="mc-logo">🎾</div><div class="mc-name">${n1}</div></div>
          <div class="mc-team"><div class="mc-logo">🎾</div><div class="mc-name">${n2}</div></div>
        </div>
        <div class="mc-scores">
          <div class="mc-score ${isLive?'live':''}">${s1}</div>
          <div class="mc-score ${isLive?'live':''}">${s2}</div>
        </div>
        <div class="mc-fav" onclick="event.stopPropagation();toggleFav('${ev.id}',this)">☆</div>
      </div>`;
    }
    html+=`<div class="grad-div" style="margin:8px 0"></div>`;
  }
  c.innerHTML=html;
}

// ── MMA ────────────────────────────────────────────────────────────────────
async function loadMMA() {
  showSkeleton();
  const c = document.getElementById('content');
  try {
    const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/mma/ufc/scoreboard');
    const d = r.ok ? await r.json() : {events:[]};
    const evts = d.events||[];
    if (!evts.length) { c.innerHTML=`<div class="empty"><div class="empty-ico">🥊</div><div class="empty-txt">No hay eventos UFC programados ahora mismo</div></div>`; return; }
    let html='';
    for (const ev of evts) {
      const venue=ev.competitions?.[0]?.venue?.fullName||'';
      const city=ev.competitions?.[0]?.venue?.address?.city||'';
      html+=`<div class="mma-event-card">
        <div class="mma-event-hdr">
          <div class="mma-event-name">${ev.name||'UFC Event'}</div>
          <div class="mma-event-meta">${[venue,city].filter(Boolean).join(' · ')}</div>
        </div>`;
      for (const fight of (ev.competitions||[])) {
        const f1=fight.competitors?.[0], f2=fight.competitors?.[1];
        if (!f1||!f2) continue;
        const isTitle=fight.notes?.some(n=>n.headline?.toLowerCase().includes('title'));
        const wclass=fight.notes?.find(n=>n.headline?.toLowerCase().includes('weight'))?.headline||fight.type?.text||'';
        html+=`<div class="mma-fight">
          <div class="mma-fighter">
            <div class="mma-f-name">${f1.athlete?.displayName||f1.team?.displayName||'?'}</div>
            <div class="mma-f-record">${f1.records?.[0]?.summary||''}</div>
          </div>
          <div class="mma-vs-block">
            ${isTitle?'<div class="mma-title-tag">🏆 Título</div>':''}
            <div class="mma-vs">VS</div>
            ${wclass?`<div class="mma-weight">${wclass}</div>`:''}
          </div>
          <div class="mma-fighter" style="text-align:right">
            <div class="mma-f-name">${f2.athlete?.displayName||f2.team?.displayName||'?'}</div>
            <div class="mma-f-record">${f2.records?.[0]?.summary||''}</div>
          </div>
        </div>`;
      }
      html+=`</div>`;
    }
    c.innerHTML=html;
  } catch(e) { c.innerHTML=`<div class="empty"><div class="empty-ico">🥊</div><div class="empty-txt">No se pudo cargar UFC</div></div>`; }
}

// ── Match Detail ───────────────────────────────────────────────────────────
async function openMatch(id, sp) {
  currentMatchId = id;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('ov-content').innerHTML=`<div style="padding:20px;display:flex;flex-direction:column;gap:8px">
    <div class="sk" style="height:180px;border-radius:${getComputedStyle(document.documentElement).getPropertyValue('--r2')}"></div>
    <div class="sk" style="height:44px;border-radius:8px"></div>
    <div class="sk" style="height:60px;border-radius:8px"></div>
    <div class="sk" style="height:60px;border-radius:8px"></div>
  </div>`;

  let ev=null, lid='';
  if (sp==='soccer') {
    for (const lg of (matchData.soccer||[])) {
      const f=lg.events?.find(e=>e.id===id);
      if (f) { ev=f; ev._lname=lg.name; lid=lg.id; break; }
    }
  } else if (sp==='basketball') {
    for (const lg of (matchData.basketball||[])) {
      const f=lg.events?.find(e=>e.id===id);
      if (f) { ev=f; ev._lname=lg.name; break; }
    }
  }
  if (!ev) { document.getElementById('ov-content').innerHTML=`<div class="empty"><div class="empty-ico">⚽</div><div class="empty-txt">No se pudo cargar</div></div>`; return; }
  renderDetail(ev, sp, lid);
}

function renderDetail(ev, sp, lid='') {
  const comp=ev.competitions?.[0];
  const home=comp?.competitors?.find(c=>c.homeAway==='home')||comp?.competitors?.[0];
  const away=comp?.competitors?.find(c=>c.homeAway==='away')||comp?.competitors?.[1];
  if (!home||!away) return;
  const isLive=ev.status?.type?.state==='in';
  const isFin=ev.status?.type?.state==='post';
  const isPre=ev.status?.type?.state==='pre';
  const hs=home.score||'0', as=away.score||'0';
  const hlg=home.team?.logos?.[0]?.href||'';
  const alg=away.team?.logos?.[0]?.href||'';
  const min=ev.status?.displayClock||'';
  const per=ev.status?.period||0;
  document.getElementById('ov-league').textContent=ev._lname||ev.name||'';
  document.getElementById('ov-fav').textContent=favs.includes(ev.id)?'★':'☆';

  const details=comp?.details||[];
  const homeStats=home.statistics||[];
  const awayStats=away.statistics||[];

  let html=`
  <div class="sb-hero">
    <div class="sb-status ${isLive?'live':isFin?'fin':'pre'}">
      ${isLive?`🔴 EN VIVO · ${per?`${per}T ·`:''} ${min}'`:
        isFin?'PARTIDO TERMINADO':
        ev.date?new Date(ev.date).toLocaleString('es',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}):'Próximo'}
    </div>
    <div class="sb-row">
      <div class="sb-team">
        <div class="sb-logo">${hlg?`<img src="${hlg}">`:'🏠'}</div>
        <div class="sb-tname">${home.team?.displayName||'Local'}</div>
      </div>
      <div class="sb-center">
        <div class="sb-scores">
          <div class="sb-n ${isLive?'live':''}">${isLive||isFin?hs:'-'}</div>
          <div class="sb-sep">:</div>
          <div class="sb-n ${isLive?'live':''}">${isLive||isFin?as:'-'}</div>
        </div>
        ${isLive?`<div class="sb-time-badge">${min}'</div>`:''}
      </div>
      <div class="sb-team">
        <div class="sb-logo">${alg?`<img src="${alg}">`:'✈️'}</div>
        <div class="sb-tname">${away.team?.displayName||'Visitante'}</div>
      </div>
    </div>
  </div>

  <div class="ov-tabs">
    <div class="ov-tab ${currentOvTab==='events'?'active':''}" onclick="switchOvTab('events')">Eventos</div>
    <div class="ov-tab ${currentOvTab==='stats'?'active':''}" onclick="switchOvTab('stats')">Estadísticas</div>
    <div class="ov-tab ${currentOvTab==='lineup'?'active':''}" onclick="switchOvTab('lineup')">Alineación</div>
  </div>

  <div id="ov-tab-events" style="display:${currentOvTab==='events'?'block':'none'}">
    ${details.length?`<div class="events-wrap">${details.map(d=>{
      const icon=d.type?.text==='Goal'?'⚽':d.type?.text==='Yellow Card'?'🟨':d.type?.text==='Red Card'?'🟥':d.type?.text?.includes('Sub')?'🔄':'•';
      return `<div class="event-item">
        <div class="ev-min">${d.clock?.displayValue||''}'</div>
        <div class="ev-icon">${icon}</div>
        <div class="ev-info">
          <div class="ev-player">${d.athletesInvolved?.[0]?.displayName||''}</div>
          <div class="ev-team">${d.team?.displayName||''}</div>
        </div>
      </div>`;
    }).join('')}</div>`:`<div class="empty" style="padding:40px"><div class="empty-ico">📋</div><div class="empty-txt">${isLive||isFin?'Sin eventos registrados':'El partido aún no comenzó'}</div></div>`}
  </div>

  <div id="ov-tab-stats" style="display:${currentOvTab==='stats'?'block':'none'}">
    ${homeStats.length?`<div class="stats-wrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:12px;font-weight:700;color:var(--blue)">${home.team?.abbreviation||'LOC'}</span>
        <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Estadísticas</span>
        <span style="font-size:12px;font-weight:700;color:var(--purple)">${away.team?.abbreviation||'VIS'}</span>
      </div>
      ${homeStats.slice(0,10).map((hs2,i)=>{
        const as2=awayStats[i];
        const hv=parseFloat(hs2.displayValue)||0, av=parseFloat(as2?.displayValue)||0;
        const tot=hv+av||1;
        const hp=Math.round(hv/tot*100), ap=100-hp;
        return `<div style="margin-bottom:12px">
          <div class="stat-row">
            <div class="stat-val h">${hs2.displayValue}</div>
            <div class="stat-bars" style="flex:1">
              <div class="stat-bar-h" style="width:${hp}%;flex:none"></div>
              <div class="stat-bar-a" style="width:${ap}%;flex:none"></div>
            </div>
            <div class="stat-val a">${as2?.displayValue||'0'}</div>
          </div>
          <div style="text-align:center;font-size:10px;color:var(--text3);margin-top:2px">${hs2.name||''}</div>
        </div>`;
      }).join('')}
    </div>`:`<div class="empty" style="padding:40px"><div class="empty-ico">📊</div><div class="empty-txt">Estadísticas no disponibles aún</div></div>`}
  </div>

  <div id="ov-tab-lineup" style="display:${currentOvTab==='lineup'?'block':'none'}">
    <div id="lineup-content"><div class="empty" style="padding:40px"><div class="empty-ico">⏳</div><div class="empty-txt">Cargando alineación...</div></div></div>
  </div>`;

  document.getElementById('ov-content').innerHTML = html;

  if (currentOvTab === 'lineup' && sp === 'soccer' && lid) fetchLineup(ev.id, lid);
  else if (sp === 'soccer' && lid) {
    // Pre-fetch lineup en background
    setTimeout(() => fetchLineup(ev.id, lid), 500);
  }
}

function switchOvTab(tab) {
  currentOvTab = tab;
  ['events','stats','lineup'].forEach(t => {
    const el = document.getElementById(`ov-tab-${t}`);
    if (el) el.style.display = t===tab ? 'block' : 'none';
    document.querySelectorAll('.ov-tab').forEach((el,i) => {
      el.classList.toggle('active', ['events','stats','lineup'][i]===tab);
    });
  });
}

async function fetchLineup(eventId, lid) {
  const el = document.getElementById('lineup-content');
  if (!el) return;
  try {
    const urls = [
      `https://site.api.espn.com/apis/site/v2/sports/soccer/${lid}/summary?event=${eventId}`,
      `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${eventId}`,
    ];
    let data = null;
    for (const url of urls) {
      try { const r=await fetch(url); if(r.ok){data=await r.json();break;} } catch(e){}
    }
    const rosters = data?.rosters||[];
    if (!rosters.length) { el.innerHTML=`<div class="empty" style="padding:40px"><div class="empty-ico">👥</div><div class="empty-txt">Alineación no disponible</div></div>`; return; }

    const posGroup = pos => {
      const p=(pos||'').toUpperCase();
      if(p.includes('GK')||p==='G') return 'GK';
      if(p.includes('D')||p.includes('CB')||p.includes('LB')||p.includes('RB')) return 'DEF';
      if(p.includes('M')||p.includes('CM')||p.includes('DM')) return 'MID';
      return 'FWD';
    };

    let html = '<div class="lineup-wrap">';
    for (const roster of rosters) {
      const tname=roster.team?.displayName||'';
      const tlg=roster.team?.logos?.[0]?.href||'';
      const entries=roster.roster||[];
      if (!entries.length) continue;
      html+=`<div class="lineup-team-hdr">${tlg?`<img src="${tlg}">`:''}${tname}</div>`;
      for (const entry of entries) {
        if (entry.didNotPlay) continue;
        const a=entry.athlete||{};
        const stats=entry.stats||[];
        const pos=entry.position?.abbreviation||'';
        const pg=posGroup(pos);
        const jersey=entry.jersey||'';
        const name=a.displayName||a.fullName||'';
        const isStarter=entry.starter!==false;
        const sm={};
        for(const s of stats) sm[s.name]=s.displayValue||s.value||'0';
        const goals=sm.goals||sm.goalsScored||'';
        const assists=sm.assists||'';
        const yellows=sm.yellowCards||'';
        const reds=sm.redCards||'';
        const rating=sm.rating||'';
        const mins=sm.minutesPlayed||sm.minutes||'';
        const pkey=`${eventId}_${jersey}_${name.replace(/\s/g,'')}`;
        window._pCache[pkey]={name, stats, pos:pg};
        html+=`<div class="player-row ${isStarter?'':'bench'}" onclick="showPlayer('${pkey}')">
          <div class="p-num">${jersey}</div>
          <div class="p-pos ${pg}">${pos||pg}</div>
          <div class="p-name">${name}</div>
          <div class="p-badges">
            ${goals&&goals!=='0'?`<span class="p-badge goal">⚽${goals}</span>`:''}
            ${assists&&assists!=='0'?`<span class="p-badge assist">🅰️${assists}</span>`:''}
            ${yellows&&yellows!=='0'?`<span class="p-badge yellow">🟨</span>`:''}
            ${reds&&reds!=='0'?`<span class="p-badge red">🟥</span>`:''}
            ${rating&&rating!=='0'?`<span class="p-badge rating">${parseFloat(rating).toFixed(1)}</span>`:''}
          </div>
          <div class="p-arrow">›</div>
        </div>`;
      }
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e) {
    if(el) el.innerHTML=`<div class="empty" style="padding:40px"><div class="empty-ico">⚠️</div><div class="empty-txt">No se pudo cargar la alineación</div></div>`;
  }
}

function showPlayer(key) {
  const cached = window._pCache[key];
  if (!cached) return;
  const {name, stats, pos} = cached;
  const labels = {
    goals:'Goles',assists:'Asistencias',shots:'Tiros',shotsOnTarget:'Al arco',
    passes:'Pases',passingAccuracy:'Precisión %',tackles:'Entradas',
    fouls:'Faltas',yellowCards:'T.Amarilla',redCards:'T.Roja',
    minutesPlayed:'Minutos',rating:'Rating',dribbles:'Regates',
    aerialDuels:'Aéreos',touches:'Toques',interceptions:'Interc.',
    clearances:'Despejes',saves:'Atajadas',goalsConceded:'G.Recibidos',
    blockedShots:'Tiros bloq.',offsides:'Offside'
  };
  const colors = {
    goals:'green',assists:'blue',rating:'amber',minutesPlayed:'',
    saves:'green',goalsConceded:'',shotsOnTarget:'green',
  };
  const rel = stats.filter(s=>{const v=parseFloat(s.displayValue||s.value);return !isNaN(v)&&v>0;});
  const panel = document.getElementById('player-panel');
  panel.innerHTML = `
    <div class="pp-header">
      <div class="ov-back" onclick="closePlayer()">←</div>
      <div>
        <div class="pp-name">${name}</div>
        <div class="pp-pos">${pos}</div>
      </div>
    </div>
    <div class="pp-stats-grid">
      ${rel.length?rel.map(s=>`
        <div class="pp-stat">
          <div class="pp-stat-val ${colors[s.name]||''}">${s.displayValue||s.value}</div>
          <div class="pp-stat-label">${labels[s.name]||s.name}</div>
        </div>`).join(''):`<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--text3)">Sin estadísticas aún</div>`}
    </div>`;
  panel.classList.add('open');
}

function closePlayer() { document.getElementById('player-panel').classList.remove('open'); }
function closeOverlay() { document.getElementById('overlay').classList.remove('open'); currentMatchId=null; }

// ── Favorites ──────────────────────────────────────────────────────────────
function toggleFav(id, el) {
  const i=favs.indexOf(id);
  if(i===-1){favs.push(id);el.textContent='★';el.classList.add('on');}
  else{favs.splice(i,1);el.textContent='☆';el.classList.remove('on');}
  localStorage.setItem('ls_favs',JSON.stringify(favs));
}
function toggleOvFav() {
  if (!currentMatchId) return;
  toggleFav(currentMatchId, document.getElementById('ov-fav'));
}

function renderFavs() {
  document.getElementById('content').innerHTML = favs.length
    ? `<div class="empty"><div class="empty-ico">⭐</div><div class="empty-txt">Tus partidos favoritos aparecerán aquí cuando los marques desde Scores</div></div>`
    : `<div class="empty"><div class="empty-ico">⭐</div><div class="empty-txt">Todavía no tienes favoritos. Toca ☆ en cualquier partido</div></div>`;
}

function renderStandings() {
  document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-ico">🏆</div><div class="empty-txt">Selecciona un deporte y una liga para ver la tabla de posiciones</div></div>`;
}

function renderPlaceholder(n) {
  document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-ico">🚧</div><div class="empty-txt">Sección en construcción</div></div>`;
}

// ── Search ─────────────────────────────────────────────────────────────────
function toggleSearch() {
  searchOpen=!searchOpen;
  document.getElementById('search-wrap').style.display=searchOpen?'block':'none';
  if(searchOpen) document.getElementById('search-inp').focus();
}
function filterSearch() {
  const q=document.getElementById('search-inp').value.toLowerCase();
  document.querySelectorAll('.match-card').forEach(c=>{
    c.style.display=c.textContent.toLowerCase().includes(q)?'flex':'none';
  });
}

// ── League toggle ──────────────────────────────────────────────────────────
function toggleLg(hdr) {
  hdr.classList.toggle('collapsed');
  const m=hdr.nextElementSibling;
  if(m) m.style.display=hdr.classList.contains('collapsed')?'none':'block';
}

// ── Swipe to close overlay ─────────────────────────────────────────────────
let ty=0;
document.getElementById('overlay').addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
document.getElementById('overlay').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>80)closeOverlay();},{passive:true});

// ── Init ───────────────────────────────────────────────────────────────────
initDates();
loadSoccer();
setInterval(()=>{ if(nav==='scores') loadSport(sport); }, 60000);
</script>
